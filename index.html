<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Utopia CRM & Tasks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #1e1e2f; --accent: #ffcc00; --bg: #f5f6fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: row; min-height: 100vh; }
        .sidebar { width: 250px; background: var(--primary); color: #fff; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar h2 { color: var(--accent); font-size: 1.2rem; text-align: center; }
        .sidebar button { background: #2e2e4d; color: #fff; border: none; padding: 12px; margin: 5px 0; border-radius: 8px; cursor: pointer; text-align: right; transition: 0.3s; }
        .sidebar button.active { background: var(--accent); color: var(--primary); font-weight: bold; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .inputs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input, select, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%; box-sizing: border-box; }
        button.main-btn { background: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: var(--primary); color: var(--accent); }
        .btn-edit { background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-left: 5px; }
        .btn-del { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 10px; } .sidebar h2 { display: none; } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="sidebar">
    <h2>Utopia CRM</h2>
    <button class="tab-btn active" onclick="showTab('crmTab', this)">إدارة العملاء</button>
    <button class="tab-btn" onclick="showTab('tasksTab', this)">المهام</button>
    <div style="margin-top:auto; font-size:10px; opacity:0.7;">Developed by: Eng. Mahmoud Mohamed Marie</div>
</div>

<div class="main-content">
    <div id="crmTab" class="tab-content active">
        <div class="card">
            <h3>إضافة / تعديل عميل</h3>
            <div class="inputs-grid">
                <input type="text" id="name" placeholder="اسم العميل">
                <input type="text" id="phone" placeholder="رقم الهاتف">
                <input type="date" id="date">
                <select id="status">
                    <option value="مهتم">مهتم</option>
                    <option value="قيد المتابعة">قيد المتابعة</option>
                    <option value="مكتمل">مكتمل</option>
                    <option value="Hold">Hold</option>
                </select>
                <textarea id="notes" placeholder="ملاحظات"></textarea>
            </div>
            <button class="main-btn" id="crmSubmitBtn" onclick="saveCRM()">💾 حفظ البيانات</button>
        </div>

        <div class="card">
            <input type="text" id="search" placeholder="بحث في العملاء..." oninput="fetchCRM()">
            <table>
                <thead>
                    <tr>
                        <th>الاسم</th><th>الهاتف</th><th>الحالة</th><th>ملاحظات</th><th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="crmBody"></tbody>
            </table>
        </div>
    </div>

    <div id="tasksTab" class="tab-content">
        <div class="card">
            <h3>إضافة مهمة جديدة</h3>
            <div class="inputs-grid">
                <input type="text" id="taskText" placeholder="تفاصيل المهمة">
                <select id="taskClientSelect"><option value="">اختر العميل</option></select>
                <input type="date" id="taskDate">
            </div>
            <button class="main-btn" onclick="saveTask()">➕ إضافة المهمة</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>العميل</th><th>التاريخ</th><th>المهمة</th><th>حذف</th>
                    </tr>
                </thead>
                <tbody id="tasksBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// 1. الإعدادات
const firebaseConfig = {
    apiKey: "AIzaSyBmOQuIUzd2qYB28kPFFaGbSFJ5yXCiMLY",
    authDomain: "crm-tasking.firebaseapp.com",
    databaseURL: "https://crm-tasking-default-rtdb.firebaseio.com",
    projectId: "crm-tasking",
    storageBucket: "crm-tasking.appspot.com",
    messagingSenderId: "368062369619",
    appId: "1:368062369619:web:cd38383ab75ab473961ba6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentEditId = null;

// 2. دالة جلب البيانات الأساسية (Real-time)
function init() {
    // جلب العملاء وتحديث الجدول والقائمة المنسدلة فوراً عند أي تغيير
    db.ref('clients').on('value', (snapshot) => {
        const clients = snapshot.val() || {};
        renderCRM(clients);
        updateClientSelect(clients);
    });

    // جلب المهام
    db.ref('tasks').on('value', (snapshot) => {
        renderTasks(snapshot.val() || {});
    });
}

// 3. إدارة العملاء
function saveCRM() {
    const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        date: document.getElementById('date').value,
        status: document.getElementById('status').value,
        notes: document.getElementById('notes').value
    };

    if(!data.name) return alert("يرجى إدخال الاسم");

    if(currentEditId) {
        db.ref('clients/' + currentEditId).update(data);
        currentEditId = null;
        document.getElementById('crmSubmitBtn').innerText = "💾 حفظ البيانات";
    } else {
        db.ref('clients').push(data);
    }
    clearInputs(['name', 'phone', 'date', 'notes']);
}

function renderCRM(clients) {
    const tbody = document.getElementById('crmBody');
    const searchTerm = document.getElementById('search').value.toLowerCase();
    tbody.innerHTML = '';

    for (let id in clients) {
        if(searchTerm && !clients[id].name.toLowerCase().includes(searchTerm)) continue;

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${clients[id].name}</td>
            <td>${clients[id].phone}</td>
            <td>${clients[id].status}</td>
            <td>${clients[id].notes}</td>
            <td>
                <button class="btn-edit" onclick="editCRM('${id}')">✏️</button>
                <button class="btn-del" onclick="deleteItem('clients/${id}')">🗑️</button>
            </td>
        `;
        tbody.appendChild(tr);
    }
}

function editCRM(id) {
    db.ref('clients/' + id).once('value', (snapshot) => {
        const val = snapshot.val();
        document.getElementById('name').value = val.name;
        document.getElementById('phone').value = val.phone;
        document.getElementById('status').value = val.status;
        document.getElementById('notes').value = val.notes;
        currentEditId = id;
        document.getElementById('crmSubmitBtn').innerText = "تحديث بيانات العميل";
        window.scrollTo(0,0);
    });
}

// 4. إدارة المهام
function saveTask() {
    const task = {
        text: document.getElementById('taskText').value,
        client: document.getElementById('taskClientSelect').value,
        date: document.getElementById('taskDate').value
    };
    if(!task.text) return alert("أدخل تفاصيل المهمة");
    db.ref('tasks').push(task);
    document.getElementById('taskText').value = '';
}

function renderTasks(tasks) {
    const tbody = document.getElementById('tasksBody');
    tbody.innerHTML = '';
    for (let id in tasks) {
        tbody.innerHTML += `
            <tr>
                <td>${tasks[id].client}</td>
                <td>${tasks[id].date}</td>
                <td>${tasks[id].text}</td>
                <td><button class="btn-del" onclick="deleteItem('tasks/${id}')">🗑️</button></td>
            </tr>`;
    }
}

// 5. وظائف مساعدة
function deleteItem(path) {
    if(confirm("هل أنت متأكد من الحذف؟")) db.ref(path).remove();
}

function updateClientSelect(clients) {
    const select = document.getElementById('taskClientSelect');
    select.innerHTML = '<option value="">اختر العميل</option>';
    for(let id in clients) {
        select.innerHTML += `<option value="${clients[id].name}">${clients[id].name}</option>`;
    }
}

function clearInputs(ids) {
    ids.forEach(id => document.getElementById(id).value = '');
}

function showTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

// تشغيل النظام
window.onload = init;
</script>

</body>
</html>
