<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>CRM System & Tasks For Utopia Trading And Export</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
/* --- التنسيقات الأصلية بالكامل --- */
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:#f5f6fa; margin:0; padding:0; display:flex; flex-direction:row; min-height:100vh; color:#333; overflow-x:hidden; }
.sidebar { width:250px; background:#1e1e2f; color:#fff; display:flex; flex-direction:column; padding:20px; box-sizing:border-box; transition: all 0.3s ease; border-right: 3px solid #ffcc00; }
.sidebar h2 { font-size:1.5em; margin-bottom:20px; color:#ffcc00; text-align:center; }
.sidebar button { background:#2e2e4d; color:#fff; border:none; padding:12px; margin:5px 0; border-radius:12px; cursor:pointer; text-align:right; font-weight:bold; transition: all 0.2s ease; }
.sidebar button.active { background:#ffcc00; color:#1e1e2f; }
.sidebar .developer { font-size: 0.8em; margin-top: auto; padding: 10px; border-top: 1px solid #3f3f6b; text-align: center; }
.tabs-content { flex:1; padding:25px; overflow:auto; width:100%; box-sizing:border-box; }
.tab-content { animation:fadeIn 0.3s ease; display:none; }
.tab-content.active { display:block; }
input, select, textarea, button { padding:12px; margin:5px 0; width:100%; box-sizing:border-box; border-radius:8px; border:1px solid #ccc; outline:none; font-size: 14px; }
textarea { resize:none; height:80px; }
button { background:#007bff; color:#fff; border:none; cursor:pointer; font-weight:bold; transition:0.2s; }
.card { background:#fff; padding:15px; text-align:center; border-radius:12px; margin:5px; flex:1; box-shadow:0 4px 6px rgba(0,0,0,0.1); font-weight:bold; }
.row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
table { width:100%; border-collapse:collapse; margin-top:15px; background:#fff; border-radius:12px; overflow-x:auto; display:block; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
th, td { border-bottom:1px solid #eee; padding:12px; text-align:center; min-width: 120px; }
th { background:#1e1e2f; color:#ffcc00; font-weight:bold; }

/* --- إضافات التنبيهات والألوان (Hold/Stages) --- */
.row-hold { background-color: #fff4e5 !important; border-right: 6px solid #ffa500; }
.task-stage { padding:5px 10px; color:#fff; border-radius:12px; font-weight:bold; font-size:0.9em; }
.stage-quote { background:#ff7f50; }
.stage-follow { background:#1e90ff; }
.stage-order { background:#28a745; }
.stage-bank { background:#6f42c1; }

#toast-container { position: fixed; top:20px; right:20px; z-index:10000; }
.toast { background:#1e1e2f; color:#fff; padding:15px 20px; border-radius:12px; margin-bottom:10px; border-left: 5px solid #ffcc00; box-shadow:0 4px 15px rgba(0,0,0,0.3); animation: slideIn 0.3s ease; }
.toast.success { border-left-color: #28a745; }
.toast.error { border-left-color: #dc3545; }

.logo-container { text-align:center; margin-bottom:20px; }
.logo-container img { max-width: 160px; height: auto; border-radius: 12px; }

@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
@media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; flex-direction: row; overflow-x: auto; } .sidebar h2, .sidebar .developer { display:none; } }
</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="toast-container"></div>

<div class="sidebar">
  <h2 data-lang-key="title">Utopia CRM</h2>
  <button class="tab-btn active" onclick="showTab('crmTab', this)" data-lang-key="crm">CRM</button>
  <button class="tab-btn" onclick="showTab('tasksTab', this)" data-lang-key="tasks">Tasks</button>
  <hr>
  <div class="developer" data-lang-key="developer">Developed by Eng : <strong>Mahmoud Mohamed Marie</strong></div>
  <div style="text-align:center; font-size: 0.8em; color: #ffcc00;">📞 +201222153415</div>
  <select id="language" onchange="changeLang(this.value)">
    <option value="en">English</option>
    <option value="ar">عربي</option>
  </select>
</div>

<div class="tabs-content">
  <div id="crmTab" class="tab-content active">
    <div class="logo-container"><img src="logo.png" alt="Utopia Logo"></div>
    <h2 data-lang-key="crm_title">CRM System</h2>
    <div class="row">
      <input id="universalSearch" placeholder="Search Any Column..." oninput="renderCRM()">
    </div>
    <div class="row">
      <input id="name" placeholder="Client Name" data-lang-placeholder-en="Client Name" data-lang-placeholder-ar="اسم العميل">
      <input id="phone" placeholder="Phone" data-lang-placeholder-en="Phone" data-lang-placeholder-ar="رقم الهاتف">
      <input type="date" id="date">
      <select id="status">
        <option value="Interested" data-lang-opt="Interested" data-lang-ar="مهتم">Interested</option>
        <option value="In Progress" data-lang-opt="In Progress" data-lang-ar="قيد المتابعة">In Progress</option>
        <option value="Hold" data-lang-opt="Hold" data-lang-ar="انتظار (Hold)">Hold</option>
        <option value="Completed" data-lang-opt="Completed" data-lang-ar="مكتمل">Completed</option>
      </select>
      <textarea id="notes" placeholder="Notes" data-lang-placeholder-en="Notes" data-lang-placeholder-ar="ملاحظات"></textarea>
      <input id="agent" placeholder="Agent Name" data-lang-placeholder-en="Agent Name" data-lang-placeholder-ar="اسم المندوب">
      <input type="number" id="reminderDays" placeholder="Reminder Days" data-lang-placeholder-en="Reminder Days" data-lang-placeholder-ar="Reminder بالأيام">
      <input type="text" id="followUp" placeholder="Follow Up" data-lang-placeholder-en="Follow Up" data-lang-placeholder-ar="متابعة">
    </div>
    <button onclick="addOrUpdate()" id="mainSaveBtn" data-lang-key="save">💾 Save</button>
    <div class="row">
      <div class="card" id="totalCard">Total: 0</div>
      <div class="card" id="holdCard" style="color: #ff8c00;">Hold: 0</div>
    </div>
    <table>
      <thead>
        <tr>
          <th data-lang-key="th_name">Name</th><th data-lang-key="th_phone">Phone</th><th data-lang-key="th_date">Date</th>
          <th data-lang-key="th_status">Status</th><th data-lang-key="th_notes">Notes</th><th data-lang-key="th_agent">Agent</th>
          <th data-lang-key="th_reminder">Reminder</th><th data-lang-key="th_follow">Follow Up</th>
          <th data-lang-key="th_whatsapp">WhatsApp</th><th data-lang-key="th_edit">Edit</th><th data-lang-key="th_delete">Delete</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div id="tasksTab" class="tab-content">
    <div class="logo-container"><img src="logo.png" alt="Utopia Logo"></div>
    <h2 data-lang-key="tasks_title">Tasks Tracker</h2>
    <div class="row">
      <input id="taskInput" placeholder="Task Details">
      <select id="taskClient"><option value="">Select Client</option></select>
      <input type="date" id="taskDate">
      <select id="taskStage">
        <option value="quote">Quote Stage</option>
        <option value="follow">Follow Up Stage</option>
        <option value="order">Order Stage</option>
        <option value="bank">Bank Stage</option>
      </select>
      <button onclick="addTask()" data-lang-key="add_task">➕ Add Task</button>
    </div>
    <table>
      <thead>
        <tr>
          <th data-lang-key="th_client">Client</th><th data-lang-key="th_date">Date</th>
          <th data-lang-key="th_stage">Stage</th><th data-lang-key="th_task">Task</th><th data-lang-key="th_delete">Delete</th>
        </tr>
      </thead>
      <tbody id="tasksTableBody"></tbody>
    </table>
  </div>
</div>

<script>
// Firebase Config
const firebaseConfig = { apiKey: "AIzaSyBmOQuIUzd2qYB28kPFFaGbSFJ5yXCiMLY", authDomain: "crm-tasking.firebaseapp.com", databaseURL: "https://crm-tasking-default-rtdb.firebaseio.com", projectId: "crm-tasking", storageBucket: "crm-tasking.appspot.com", messagingSenderId: "368062369619", appId: "1:368062369619:web:cd38383ab75ab473961ba6" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let langData = {
  en: { title:"Utopia CRM", crm:"CRM System", tasks:"Tasks Tracker", developer:"Developed by Eng : Mahmoud Mohamed Marie", crm_title:"Client Management", tasks_title:"Tasks Management", save:"💾 Save Data", add_task:"➕ Add Task", th_name:"Name", th_phone:"Phone", th_date:"Date", th_status:"Status", th_notes:"Notes", th_agent:"Agent", th_reminder:"Reminder", th_follow:"Follow Up", th_whatsapp:"WhatsApp", th_edit:"Edit", th_delete:"Delete", th_client:"Client", th_stage:"Stage", th_task:"Task" },
  ar: { title:"يوتوبيا CRM", crm:"نظام العملاء", tasks:"جدول المهام", developer:"تطوير المهندس: محمود محمد ماري", crm_title:"إدارة العملاء", tasks_title:"إدارة المهام", save:"💾 حفظ البيانات", add_task:"➕ إضافة مهمة", th_name:"الاسم", th_phone:"الهاتف", th_date:"التاريخ", th_status:"الحالة", th_notes:"ملاحظات", th_agent:"المندوب", th_reminder:"تذكير", th_follow:"متابعة", th_whatsapp:"واتساب", th_edit:"تعديل", th_delete:"حذف", th_client:"العميل", th_stage:"المرحلة", th_task:"المهمة" }
};

let currentLang='en', clients={}, tasks={}, editId=null;

// --- Notification Logic ---
function showToast(msg, type='success') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerText = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity='0'; setTimeout(()=>toast.remove(), 400); }, 3000);
}

// Load Data
db.ref('clients').on('value', s => { clients = s.val() || {}; renderCRM(); updateClientDropdown(); });
db.ref('tasks').on('value', s => { tasks = s.val() || {}; renderTasks(); });

function showTab(id, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// CRM Logic
function addOrUpdate(){
  const name = document.getElementById('name').value;
  if(!name) return showToast("Name is required", "error");

  const data = {
    name, phone: document.getElementById('phone').value,
    date: document.getElementById('date').value,
    status: document.getElementById('status').value,
    notes: document.getElementById('notes').value,
    agent: document.getElementById('agent').value,
    reminderDays: document.getElementById('reminderDays').value,
    followUp: document.getElementById('followUp').value
  };

  if(editId){
    db.ref('clients/'+editId).set(data).then(()=>showToast("Client Updated Successfully"));
    editId = null;
    document.getElementById('mainSaveBtn').innerText = currentLang==='ar' ? "💾 حفظ البيانات" : "💾 Save Data";
  } else {
    db.ref('clients').push(data).then(()=>showToast("New Client Added"));
  }
  clearFields();
}

function renderCRM(){
  const tbody = document.getElementById('tableBody');
  const search = document.getElementById('universalSearch').value.toLowerCase();
  tbody.innerHTML = '';
  let total=0, hold=0;

  for(let id in clients){
    const c = clients[id];
    if(search && !c.name.toLowerCase().includes(search) && !c.phone.includes(search)) continue;

    total++;
    const isHold = c.status === "Hold";
    if(isHold) hold++;

    tbody.innerHTML += `<tr class="${isHold ? 'row-hold' : ''}">
      <td style="font-weight:bold">${c.name}</td><td>${c.phone}</td><td>${c.date}</td>
      <td>${c.status}</td><td>${c.notes}</td><td>${c.agent}</td>
      <td>${c.reminderDays}</td><td>${c.followUp}</td>
      <td><button onclick="window.open('https://wa.me/${c.phone}')" style="background:#25D366">📱</button></td>
      <td><button onclick="editClient('${id}')" style="background:#28a745">✏️</button></td>
      <td><button onclick="deleteClient('${id}')" style="background:#dc3545">🗑️</button></td>
    </tr>`;
  }
  document.getElementById('totalCard').innerText = (currentLang==='ar'?'الإجمالي: ':'Total: ') + total;
  document.getElementById('holdCard').innerText = (currentLang==='ar'?'الانتظار: ':'Hold: ') + hold;
}

function editClient(id){
  const c = clients[id];
  editId = id;
  document.getElementById('name').value = c.name;
  document.getElementById('phone').value = c.phone;
  document.getElementById('date').value = c.date;
  document.getElementById('status').value = c.status;
  document.getElementById('notes').value = c.notes;
  document.getElementById('agent').value = c.agent;
  document.getElementById('reminderDays').value = c.reminderDays;
  document.getElementById('followUp').value = c.followUp;
  document.getElementById('mainSaveBtn').innerText = currentLang==='ar' ? "تحديث الآن" : "Update Now";
  showToast("Ready to edit: " + c.name);
}

function deleteClient(id){
  if(confirm("Delete?")) db.ref('clients/'+id).remove().then(()=>showToast("Client Deleted", "error"));
}

// Tasks Logic
function addTask(){
  const t = {
    text: document.getElementById('taskInput').value,
    client: document.getElementById('taskClient').value,
    date: document.getElementById('taskDate').value,
    stage: document.getElementById('taskStage').value
  };
  if(!t.text) return showToast("Enter task details", "error");
  db.ref('tasks').push(t).then(()=>showToast("Task Assigned"));
  document.getElementById('taskInput').value='';
}

function renderTasks(){
  const tbody = document.getElementById('tasksTableBody');
  tbody.innerHTML = '';
  for(let id in tasks){
    const t = tasks[id];
    tbody.innerHTML += `<tr>
      <td>${t.client}</td><td>${t.date}</td>
      <td><span class="task-stage stage-${t.stage}">${t.stage.toUpperCase()}</span></td>
      <td>${t.text}</td>
      <td><button onclick="deleteTask('${id}')" style="background:#dc3545">🗑️</button></td>
    </tr>`;
  }
}

function deleteTask(id){ db.ref('tasks/'+id).remove().then(()=>showToast("Task Removed", "error")); }

function updateClientDropdown(){
  const sel = document.getElementById('taskClient');
  sel.innerHTML = '<option value="">Select Client</option>';
  for(let id in clients) sel.innerHTML += `<option value="${clients[id].name}">${clients[id].name}</option>`;
}

function clearFields(){
  ['name','phone','date','notes','agent','reminderDays','followUp'].forEach(i=>document.getElementById(i).value='');
}

function changeLang(l){
  currentLang = l;
  document.body.dir = l==='ar'?'rtl':'ltr';
  document.querySelectorAll('[data-lang-key]').forEach(el => {
    el.innerText = langData[l][el.getAttribute('data-lang-key')];
  });
  // Update Placeholders
  document.querySelectorAll('[data-lang-placeholder-en]').forEach(el => {
    el.placeholder = el.getAttribute(`data-lang-placeholder-${l}`);
  });
  renderCRM(); renderTasks();
  showToast(l==='ar' ? "تم تحويل اللغة" : "Language Switched");
}
</script>
</body>
</html>
