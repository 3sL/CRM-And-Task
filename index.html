<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Utopia Pro - Notifications Enabled</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1e1e2f; --accent: #ffcc00; --success: #28a745; --danger: #dc3545; --info: #17a2b8; }
        body { font-family:'Segoe UI',Tahoma,sans-serif; background:#f5f6fa; margin:0; display:flex; min-height:100vh; color:#333; overflow:hidden; }
        .no-select { -webkit-user-select: none; user-select: none; }

        /* Login Styling */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 20000; }
        .login-card { background: #2e2e4d; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; color: white; }
        .login-card input { background: #3f3f6b; border: none; color: white; margin-bottom: 15px; padding: 15px; border-radius: 10px; width: 100%; outline: none; }
        .login-card button { background: var(--accent); color: var(--primary); border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        /* Sidebar & Layout */
        #mainApp { display: none; width: 100%; height: 100vh; flex-direction: row; }
        .sidebar { width:260px; background:var(--primary); color:#fff; display:flex; flex-direction:column; padding:20px; box-sizing:border-box; flex-shrink: 0; }
        .sidebar h2 { font-size:1.1em; color:var(--accent); text-align:center; border-bottom: 1px solid #3f3f6b; padding-bottom: 15px; }
        .sidebar button { background:#2e2e4d; color:#fff; border:none; padding:12px; margin:5px 0; border-radius:12px; cursor:pointer; text-align: left; transition: 0.3s; }
        .sidebar button.active { background:var(--accent); color:var(--primary); font-weight: bold; }
        
        .main { flex:1; padding:25px; box-sizing:border-box; overflow-y:auto; }
        .tab-content { display:none; }
        .tab-content.active { display:block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Elements */
        input, select, textarea, .btn-save { padding:12px; margin:5px 0; width:100%; box-sizing:border-box; border-radius:10px; border:1px solid #ddd; outline:none; }
        .btn-save { background: var(--success); color: white; font-weight: bold; border: none; cursor: pointer; }
        table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; margin-top: 20px; font-size: 0.9em; }
        th, td { padding:12px; text-align:center; border-bottom:1px solid #eee; }
        th { background:var(--primary); color:var(--accent); }

        /* Notification Toast */
        #notification { 
            position: fixed; top: 20px; right: 20px; padding: 15px 25px; 
            border-radius: 12px; display: none; z-index: 99999; 
            color: white; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .dev-box { margin-top:auto; font-size:0.75em; color:#888; padding-top:10px; border-top:1px solid #3f3f6b; }
        .dev-link { color: #25D366; text-decoration: none; font-weight: bold; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="no-select" oncontextmenu="return false;">

<div id="notification"></div>

<div id="loginOverlay">
    <div class="login-card">
        <h2>Utopia Login</h2>
        <input type="text" id="userInput" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="handleAuth()">Access System</button>
        <p id="loginError" style="color: var(--danger); margin-top: 10px; font-size: 0.8em; display: none;">Access Denied!</p>
    </div>
</div>

<div id="mainApp">
    <div class="sidebar">
        <h2>Utopia Export Pro</h2>
        <p id="welcomeUser" style="font-size: 0.8em; text-align: center; color: #25D366; margin-top: -10px;"></p>
        
        <button onclick="enableAudio()" id="audioBtn" style="background: #3f3f6b; border: 1px dashed var(--accent); font-size: 0.8em; margin-bottom: 15px;">🔔 Enable Alerts Sound</button>

        <button id="btnCrmTab" class="tab-btn active" onclick="showTab('crmTab', this)">👥 Clients Management</button>
        <button class="tab-btn" onclick="showTab('dashboardTab', this)">📊 AI Analytics</button>
        <button class="tab-btn" onclick="showTab('tasksTab', this)">📅 Tasks Board</button>
        <button class="tab-btn" onclick="showTab('recycleTab', this)" style="color: #ff9999;">♻️ Recycle Bin</button>
        
        <div class="dev-box">
            <b>Dev: Mahmoud Mohamed Marie</b><br>
            <a href="https://wa.me/201222153415" class="dev-link">🟢 WhatsApp Support</a>
            <button onclick="logout()" style="background: var(--danger); margin-top: 10px; width: 100%; border:none; padding:8px; color:white; border-radius:5px; cursor:pointer;">Logout</button>
        </div>
    </div>

    <div class="main">
        <div id="crmTab" class="tab-content active">
            <h2>Clients Registry</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input id="search" placeholder="🔍 Quick Search..." oninput="renderCRM()" style="flex:2">
                <button onclick="exportData()" style="flex:1; background:#6c757d; color:white; border:none; border-radius:10px; cursor:pointer;">Export CSV</button>
            </div>
            <div class="row" style="display:flex; gap:10px; flex-wrap:wrap;">
                <input id="name" placeholder="Name" style="flex:1">
                <input id="phone" placeholder="Phone" style="flex:1">
                <select id="gov" style="flex:1"></select>
                <select id="status" style="flex:1">
                    <option>Interested</option><option>In Progress</option><option>Hold</option><option>Completed</option>
                </select>
            </div>
            <textarea id="notes" placeholder="Detailed Notes..."></textarea>
            <div class="row" style="display:flex; gap:10px;">
                <input id="agent" placeholder="Agent Name">
                <input id="followUp" placeholder="Next Action">
                <input type="date" id="date">
            </div>
            <button class="btn-save" onclick="addOrUpdate()">💾 Save Client Record</button>
            
            <table>
                <thead><tr><th>Name</th><th>Phone</th><th>Gov</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="dashboardTab" class="tab-content">
            <h2>📊 Analytics Insight</h2>
            <div style="background:#fff; padding:20px; border-radius:15px; max-width:500px; margin:auto;">
                <canvas id="statusChart"></canvas>
            </div>
        </div>

        <div id="tasksTab" class="tab-content">
            <h2>Operations Tasks</h2>
            <div style="display:flex; gap:10px;">
                <input id="taskText" placeholder="Task description" style="flex:2">
                <input type="date" id="taskDate" style="flex:1">
                <button onclick="addTask()" style="background:var(--info); color:white; border:none; padding:0 20px; border-radius:10px; cursor:pointer;">Add Task</button>
            </div>
            <table>
                <thead><tr><th>Task</th><th>Deadline</th><th>Action</th></tr></thead>
                <tbody id="taskBody"></tbody>
            </table>
        </div>

        <div id="recycleTab" class="tab-content">
            <h2 style="color:var(--danger)">♻️ Deleted Records</h2>
            <tbody id="recycleBody"></tbody>
        </div>
    </div>
</div>

<script>
// --- AUDIO SYSTEM ---
const notifySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

function enableAudio() {
    notifySound.play().then(() => {
        notifySound.pause();
        document.getElementById('audioBtn').innerHTML = "✅ Audio Active";
        document.getElementById('audioBtn').style.borderColor = "var(--success)";
        notify("Audio Alerts Enabled!", "success");
    }).catch(e => console.log("Audio Init Failed"));
}

function playAlert() {
    notifySound.currentTime = 0;
    notifySound.play().catch(e => console.log("Sound blocked by browser"));
}

// --- AUTH & SECURITY ---
const USERS = [{u:'admin', p:'admin123'}, {u:'mahmoud', p:'2026marie'}];

function handleAuth() {
    const u = document.getElementById('userInput').value.toLowerCase();
    const p = document.getElementById('passInput').value;
    if(USERS.find(x => x.u === u && x.p === p)) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('welcomeUser').innerText = "User: " + u;
        notify("Welcome back, " + u, "success");
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
}

function logout() { location.reload(); }

// --- FIREBASE CONFIG ---
const firebaseConfig = { 
    apiKey: "AIzaSyBmOQuIUzd2qYB28kPFFaGbSFJ5yXCiMLY", 
    authDomain: "crm-tasking.firebaseapp.com", 
    databaseURL: "https://crm-tasking-default-rtdb.firebaseio.com", 
    projectId: "crm-tasking"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- LOGIC ---
let clients = [], tasks = [], editIdx = -1;
const govs = ["Cairo", "Giza", "Alexandria", "Dakahlia", "Sharkia", "Monufia", "Gharbia", "Beheira", "Suez"];

function notify(msg, type='info') {
    const n = document.getElementById('notification');
    n.innerText = msg;
    n.style.display = 'block';
    n.style.background = type === 'success' ? '#28a745' : type === 'error' ? '#dc3545' : '#17a2b8';
    if(type === 'success') playAlert();
    setTimeout(() => n.style.display = 'none', 3000);
}

function showTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

function fillGovs() {
    const s = document.getElementById('gov');
    s.innerHTML = '<option value="">Governorate</option>';
    govs.forEach(g => s.innerHTML += `<option value="${g}">${g}</option>`);
}

function addOrUpdate() {
    const n = document.getElementById('name').value;
    if(!n) return notify("Name is required!", "error");
    
    const obj = {
        name: n, phone: document.getElementById('phone').value,
        gov: document.getElementById('gov').value, status: document.getElementById('status').value,
        notes: document.getElementById('notes').value, agent: document.getElementById('agent').value,
        followUp: document.getElementById('followUp').value, date: document.getElementById('date').value || new Date().toISOString().split('T')[0]
    };

    if(editIdx > -1) { clients[editIdx] = obj; editIdx = -1; } 
    else { clients.push(obj); }
    
    db.ref('clients').set({...clients});
    notify("Client Saved Successfully", "success");
    resetForm();
}

function resetForm() {
    ['name','phone','notes','agent','followUp','date'].forEach(id => document.getElementById(id).value = '');
}

function renderCRM() {
    const b = document.getElementById('tableBody'); b.innerHTML = '';
    const q = document.getElementById('search').value.toLowerCase();
    clients.forEach((c, i) => {
        if(q && !c.name.toLowerCase().includes(q)) return;
        b.innerHTML += `<tr>
            <td>${c.name}</td><td>${c.phone}</td><td>${c.gov}</td><td>${c.status}</td>
            <td>
                <button onclick="editClient(${i})">✏️</button>
                <button onclick="delClient(${i})" style="color:red">✕</button>
            </td>
        </tr>`;
    });
}

function editClient(i) {
    editIdx = i; const c = clients[i];
    document.getElementById('name').value = c.name;
    document.getElementById('phone').value = c.phone;
    document.getElementById('status').value = c.status;
    document.getElementById('notes').value = c.notes;
    document.getElementById('agent').value = c.agent;
    document.getElementById('followUp').value = c.followUp;
    document.getElementById('date').value = c.date;
    showTab('crmTab', document.getElementById('btnCrmTab'));
}

function delClient(i) {
    if(confirm('Delete this client?')) {
        clients.splice(i, 1);
        db.ref('clients').set({...clients});
        notify("Client Deleted", "info");
    }
}

function addTask() {
    const txt = document.getElementById('taskText').value;
    if(!txt) return;
    tasks.push({ text: txt, date: document.getElementById('taskDate').value });
    db.ref('tasks').set({...tasks});
    document.getElementById('taskText').value = '';
    notify("Task Added", "success");
}

function renderTasks() {
    const b = document.getElementById('taskBody'); b.innerHTML = '';
    tasks.forEach((t, i) => {
        b.innerHTML += `<tr><td>${t.text}</td><td>${t.date}</td><td><button onclick="tasks.splice(${i},1); db.ref('tasks').set({...tasks});">Done</button></td></tr>`;
    });
}

// Listeners
db.ref('clients').on('value', s => { clients = s.val() ? Object.values(s.val()) : []; renderCRM(); });
db.ref('tasks').on('value', s => { tasks = s.val() ? Object.values(s.val()) : []; renderTasks(); });

fillGovs();
</script>
</body>
</html>
