<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>CRM System & Tasks For Utopia Trading And Export</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial,sans-serif;background:#f5f6fa;margin:0;padding:0;display:flex;flex-direction:row;min-height:100vh;color:#333;overflow-x:hidden}
h2{margin-top:0;text-align:center}
.sidebar{width:250px;background:#1e1e2f;color:#fff;display:flex;flex-direction:column;padding:20px;box-sizing:border-box;transition:all 0.3s ease}
.sidebar h2{font-size:1.5em;margin-bottom:20px;color:#ffcc00}
.sidebar button{background:#2e2e4d;color:#fff;border:none;padding:12px;margin:5px 0;border-radius:12px;cursor:pointer;text-align:right;font-weight:bold;transition:all 0.2s ease}
.sidebar button:hover{background:#3f3f6b}
.sidebar button.active{background:#ffcc00;color:#1e1e2f}
.sidebar select{padding:10px;border-radius:8px;border:none;margin-top:10px}
.tabs-content{flex:1;padding:25px;overflow:auto;width:100%;box-sizing:border-box;min-width:0}
.tab-content{animation:fadeIn 0.3s ease;display:none}
.tab-content.active{display:block}
input,select,textarea,button{padding:12px;margin:5px 0;width:100%;box-sizing:border-box;border-radius:8px;border:1px solid #ccc;outline:none}
textarea{resize:none;height:80px}
button{background:#007bff;color:#fff;border:none;cursor:pointer;font-weight:bold;transition:0.2s}
.card{background:#fff;padding:15px;text-align:center;border-radius:12px;margin:5px;flex:1;box-shadow:0 4px 6px rgba(0,0,0,0.1);font-weight:bold}
.row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
table{width:100%;border-collapse:collapse;margin-top:15px;table-layout: fixed;background:#fff;border-radius:12px;overflow-x:auto;display:block;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
th,td{border-bottom:1px solid #eee;padding:12px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
th{background:#1e1e2f;color:#ffcc00;font-weight:bold}
#notification{position:fixed;top:20px;right:20px;background:#ffcc00;color:#1e1e2f;padding:15px 20px;border-radius:12px;display:none;z-index:999;min-width:220px;font-weight:bold;box-shadow:0 4px 8px rgba(0,0,0,0.2);cursor:pointer}
.task-stage{padding:5px 10px;color:#fff;border-radius:12px;font-weight:bold;font-size:0.9em}
.stage-quote{background:#ff7f50}
.stage-follow{background:#1e90ff}
.stage-order{background:#28a745}
.stage-bank{background:#6f42c1}
.logo-container{text-align:center;margin-bottom:20px}
.logo-container img{max-width:100%;height:auto;display:inline-block;border-radius:12px}
@media(max-width:768px){body{flex-direction:column}.sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:10px}.sidebar h2{font-size:1em;margin-bottom:0;white-space:nowrap;flex:1 0 auto}.sidebar button{flex:1 0 auto;margin:0 5px;white-space:nowrap;font-size:0.9em;padding:8px}.sidebar select{width:auto;margin-left:10px;font-size:0.9em}.tabs-content{padding:10px;width:100%}table{width:100%;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}th,td{white-space:nowrap;font-size:0.8em;padding:6px}.row{flex-direction:column}input,select,textarea,button{font-size:0.9em}.card{flex:1 1 100%;margin-bottom:10px}.logo-container img{max-height:80px}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<div class="sidebar">
<h2 id="title">CRM System & Tasks For Utopia Trading And Export</h2>
<button class="tab-btn active" onclick="showTab('crmTab', this)" id="crmBtn">CRM</button>
<button class="tab-btn" onclick="showTab('tasksTab', this)" id="tasksBtn">Tasks</button>
<hr>
<div class="developer" id="devText">Developed by Eng : <strong>Mahmoud Mohamed Marie</strong></div>
<div class="phone">📞 +201222153415</div>
<select id="language" onchange="changeLang(this.value)">
<option value="en">English</option>
<option value="ar">عربي</option>
</select>
</div>

<div class="tabs-content">
<div id="notification"></div>

<div id="crmTab" class="tab-content active">
<div class="logo-container"><img src="logo.png" alt="Company Logo"></div>
<h2 id="crmHeader">CRM System</h2>
<div class="row">
<input id="universalSearch" placeholder="Search Any Column..." oninput="renderCRM()">
</div>
<div class="row">
<input id="name" placeholder="Client Name">
<input id="phone" placeholder="Phone">
<select id="governorate"></select>
<input type="date" id="date">
<select id="status"></select>
<textarea id="notes" placeholder="Notes"></textarea>
<input id="agent" placeholder="Agent Name">
<input type="number" id="reminderDays" placeholder="Reminder Days">
<input type="text" id="followUp" placeholder="Follow Up">
</div>
<button onclick="addOrUpdate()" id="saveBtn">💾 Save</button>
<button onclick="exportPDFWithArabicSupport()" id="exportBtn">📄 Export PDF</button>
<div class="row">
<div class="card" id="total">0</div>
<div class="card" id="hold">Hold: 0</div>
</div>
<table>
<thead>
<tr>
<th id="thName">Name</th>
<th id="thPhone">Phone</th>
<th id="thGovernorate">Governorate</th>
<th id="thDate">Date</th>
<th id="thStatus">Status</th>
<th id="thNotes">Notes</th>
<th id="thReminder">Reminder</th>
<th id="thFollowUp">Follow Up</th>
<th id="thWhatsApp">WhatsApp</th>
<th id="thTrack">Track</th>
<th id="thEdit">Edit</th>
<th id="thDelete">Delete</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<div id="tasksTab" class="tab-content">
<div class="logo-container"><img src="logo.png" alt="Company Logo"></div>
<h2 id="tasksHeader">Tasks</h2>
<div class="row">
<input id="taskInput" placeholder="Task Text">
<select id="taskClient"><option value="">Select Client</option></select>
<select id="taskGovernorate"></select>
<input type="date" id="taskDate">
<select id="taskStage"></select>
<button onclick="addTask()" id="addTaskBtn">➕ Add Task</button>
</div>
<table>
<thead>
<tr>
<th id="thTaskClient">Client</th>
<th id="thTaskGovernorate">Governorate</th>
<th id="thTaskDate">Date</th>
<th id="thTaskStage">Stage</th>
<th id="thTaskText">Task</th>
<th id="thTaskEdit">Edit</th>
<th id="thTaskDelete">Delete</th>
</tr>
</thead>
<tbody id="taskList"></tbody>
</table>
</div>
</div>

<script>
// --- Firebase Config ---
const firebaseConfig = {
  // ضع إعداداتك هنا
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- Tabs ---
function showTab(id, btn){
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// --- اللغة ---
const texts={
en:{title:"CRM System & Tasks For Utopia Trading And Export",crm:"CRM",tasks:"Tasks",dev:"Developed by Eng : ",search:"Search Any Column...",clientName:"Client Name",phone:"Phone",governorate:"Governorate",date:"Date",statusOptions:["Interested","In Progress","Hold","Completed"],notes:"Notes",agent:"Agent Name",reminder:"Reminder Days",follow:"Follow Up",save:"💾 Save",export:"📄 Export PDF",total:"Total",hold:"Hold",taskText:"Task Text",selectClient:"Select Client",addTask:"➕ Add Task",thName:"Name",thPhone:"Phone",thGovernorate:"Governorate",thDate:"Date",thStatus:"Status",thNotes:"Notes",thReminder:"Reminder",thFollowUp:"Follow Up",thWhatsApp:"WhatsApp",thTrack:"Track",thEdit:"Edit",thDelete:"Delete",thTaskClient:"Client",thTaskGovernorate:"Governorate",thTaskDate:"Date",thTaskStage:"Stage",thTaskText:"Task",thTaskEdit:"Edit",thTaskDelete:"Delete"},
ar:{title:"نظام إدارة العملاء والمهام لشركة يوتوبيا للتجارة والتصدير",crm:"نظام العملاء",tasks:"المهام",dev:"تم التطوير بواسطة : ",search:"ابحث في أي عمود...",clientName:"اسم العميل",phone:"الهاتف",governorate:"المحافظة",date:"التاريخ",statusOptions:["مهتم","قيد التنفيذ","معلق","مكتمل"],notes:"ملاحظات",agent:"اسم الموظف",reminder:"أيام التذكير",follow:"المتابعة",save:"💾 حفظ",export:"📄 تصدير PDF",total:"الإجمالي",hold:"معلق",taskText:"المهمة",selectClient:"اختر العميل",addTask:"➕ إضافة مهمة",thName:"الاسم",thPhone:"الهاتف",thGovernorate:"المحافظة",thDate:"التاريخ",thStatus:"الحالة",thNotes:"الملاحظات",thReminder:"التذكير",thFollowUp:"المتابعة",thWhatsApp:"واتساب",thTrack:"تتبع",thEdit:"تعديل",thDelete:"حذف",thTaskClient:"العميل",thTaskGovernorate:"المحافظة",thTaskDate:"التاريخ",thTaskStage:"المرحلة",thTaskText:"المهمة",thTaskEdit:"تعديل",thTaskDelete:"حذف"}
};

// --- القوائم ---
const governorates=[
  {en:"Cairo", ar:"القاهرة"}, {en:"Alexandria", ar:"الإسكندرية"}, {en:"Giza", ar:"الجيزة"},
  {en:"Qalyubia", ar:"القليوبية"}, {en:"Gharbia", ar:"الغربية"}, {en:"Dakahlia", ar:"الدقهلية"},
  {en:"Sharqia", ar:"الشرقية"}, {en:"Beheira", ar:"البحيرة"}, {en:"Fayoum", ar:"الفيوم"},
  {en:"Menofia", ar:"المنوفية"}, {en:"Assiut", ar:"أسيوط"}, {en:"Sohag", ar:"سوهاج"},
  {en:"Minya", ar:"المنيا"}, {en:"Beni Suef", ar:"بني سويف"}, {en:"Luxor", ar:"الأقصر"},
  {en:"Aswan", ar:"أسوان"}, {en:"Red Sea", ar:"البحر الأحمر"}, {en:"New Valley", ar:"الوادي الجديد"},
  {en:"Ismailia", ar:"الإسماعيلية"}, {en:"Suez", ar:"السويس"}, {en:"North Sinai", ar:"شمال سيناء"},
  {en:"South Sinai", ar:"جنوب سيناء"}, {en:"Port Said", ar:"بورسعيد"}, {en:"Damietta", ar:"دمياط"},
  {en:"Kafr El Sheikh", ar:"كفر الشيخ"}, {en:"Matrouh", ar:"مرسى مطروح"}, {en:"Qena", ar:"قنا"},
  {en:"Helwan", ar:"حلوان"}, {en:"Marsa Matrouh", ar:"مرسى مطروح"}
];
const statuses=[
  {en:"Interested", ar:"مهتم"}, {en:"In Progress", ar:"قيد التنفيذ"},
  {en:"Hold", ar:"معلق"}, {en:"Completed", ar:"مكتمل"}
];
const stages=[
  {en:"quote", ar:"عرض"}, {en:"follow", ar:"متابعة"}, 
  {en:"order", ar:"طلب"}, {en:"bank", ar:"بنك"}
];

// --- تغيير اللغة ---
function changeLang(lang){
  document.documentElement.lang = lang;
  document.getElementById('title').innerText = texts[lang].title;
  document.getElementById('crmHeader').innerText = texts[lang].crm;
  document.getElementById('tasksHeader').innerText = texts[lang].tasks;
  document.getElementById('devText').innerHTML = texts[lang].dev + "<strong>Mahmoud Mohamed Marie</strong>";
  document.getElementById('crmBtn').innerText = texts[lang].crm;
  document.getElementById('tasksBtn').innerText = texts[lang].tasks;
  document.getElementById('saveBtn').innerText = texts[lang].save;
  document.getElementById('exportBtn').innerText = texts[lang].export;
  document.getElementById('addTaskBtn').innerText = texts[lang].addTask;
  document.getElementById('universalSearch').placeholder = texts[lang].search;
  document.getElementById('name').placeholder = texts[lang].clientName;
  document.getElementById('phone').placeholder = texts[lang].phone;
  document.getElementById('notes').placeholder = texts[lang].notes;
  document.getElementById('agent').placeholder = texts[lang].agent;
  document.getElementById('reminderDays').placeholder = texts[lang].reminder;
  document.getElementById('followUp').placeholder = texts[lang].follow;
  document.getElementById('taskInput').placeholder = texts[lang].taskText;

  // رؤوس الجداول
  const ids=['thName','thPhone','thGovernorate','thDate','thStatus','thNotes','thReminder','thFollowUp','thWhatsApp','thTrack','thEdit','thDelete',
             'thTaskClient','thTaskGovernorate','thTaskDate','thTaskStage','thTaskText','thTaskEdit','thTaskDelete'];
  ids.forEach(id=>document.getElementById(id).innerText = texts[lang][id]);

  populateGovernorates();
  populateStatus();
  populateTaskStages();
  populateClientDropdown();
  renderCRM();
  renderTasks();
}

// --- إعادة ملئ القوائم ---
function populateGovernorates(){
  const lang=document.documentElement.lang;
  const sel=document.getElementById('governorate');
  const taskSel=document.getElementById('taskGovernorate');
  sel.innerHTML=`<option value="">${lang==='ar'?'اختر المحافظة':'Select Governorate'}</option>`;
  taskSel.innerHTML=`<option value="">${lang==='ar'?'اختر المحافظة':'Select Governorate'}</option>`;
  governorates.forEach(g=>{
    sel.innerHTML+=`<option value="${g.en}">${lang==='ar'?g.ar:g.en}</option>`;
    taskSel.innerHTML+=`<option value="${g.en}">${lang==='ar'?g.ar:g.en}</option>`;
  });
}
function populateStatus(){
  const lang=document.documentElement.lang;
  const statusSel=document.getElementById('status');
  statusSel.innerHTML='';
  statuses.forEach(s=>statusSel.innerHTML+=`<option value="${s.en}">${lang==='ar'?s.ar:s.en}</option>`);
}
function populateTaskStages(){
  const lang=document.documentElement.lang;
  const stageSel=document.getElementById('taskStage');
  stageSel.innerHTML='';
  stages.forEach(s=>stageSel.innerHTML+=`<option value="${s.en}">${lang==='ar'?s.ar:s.en}</option>`);
}

// --- عملاء ومهام ---
let clients=[],tasks=[],editIndex=-1,taskEditIndex=-1;
function loadClientsFromFirebase(){ db.ref('clients').on('value', snapshot=>{ clients=snapshot.val()?Object.values(snapshot.val()):[]; renderCRM(); populateClientDropdown(); }); }
function loadTasksFromFirebase(){ db.ref('tasks').on('value', snapshot=>{ tasks=snapshot.val()?Object.values(snapshot.val()):[]; renderTasks(); }); }
function populateClientDropdown(){ const sel=document.getElementById('taskClient'); sel.innerHTML=`<option value="">${texts[document.documentElement.lang].selectClient}</option>`; clients.forEach(c=>sel.innerHTML+=`<option value="${c.name}">${c.name}</option>`); }
// --- عرض العملاء والمهام ---
function renderCRM(){ /* ضع هنا الكود لعرض العملاء في الجدول */ }
function renderTasks(){ /* ضع هنا الكود لعرض المهام في الجدول */ }
// --- إضافة/تحديث ---
function addOrUpdate(){ /* ضع هنا الكود */ }
function addTask(){ /* ضع هنا الكود */ }
function exportPDFWithArabicSupport(){ /* ضع هنا الكود */ }

window.onload=function(){
  changeLang('en');
  loadClientsFromFirebase();
  loadTasksFromFirebase();
};
</script>

</body>
</html>
