<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial, sans-serif; background:#f0f2f5; margin:0; padding:0; display:flex; flex-direction:row; min-height:100vh; }

.sidebar { width:250px; background:#007bff; color:#fff; padding:20px; }
.sidebar button { background:#0056b3; color:#fff; border:none; padding:10px; margin:5px 0; width:100%; border-radius:5px; cursor:pointer; }
.sidebar button.active { background:#ffcc00; color:#000; }

.tabs-content { flex:1; padding:20px; }

.tab-content { display:none; }
.tab-content.active { display:block; }

input, select, textarea, button { width:100%; margin:5px 0; padding:10px; }

table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { border:1px solid #ddd; padding:8px; text-align:center; }

.card { background:#eee; padding:10px; margin:5px; border-radius:5px; }

.row { display:flex; gap:10px; flex-wrap:wrap; }

.task-stage { padding:5px; color:#fff; border-radius:5px; }
.stage-quote { background:orange; }
.stage-follow { background:blue; }
.stage-order { background:green; }
.stage-bank { background:purple; }
</style>

</head>
<body>

<div class="sidebar">
<h2>CRM</h2>
<button class="tab-btn active" onclick="showTab('crmTab', this)">CRM</button>
<button class="tab-btn" onclick="showTab('tasksTab', this)">Tasks</button>
</div>

<div class="tabs-content">

<!-- CRM -->
<div id="crmTab" class="tab-content active">
<h2>CRM</h2>

<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="رقم الهاتف">
<input type="date" id="date">

<select id="status">
<option>Interested</option>
<option>In Progress</option>
<option>Hold</option>
<option>Completed</option>
</select>

<textarea id="notes"></textarea>

<button onclick="addClient()">حفظ</button>

<table>
<thead>
<tr>
<th>الاسم</th><th>الهاتف</th><th>الحالة</th><th>حذف</th>
</tr>
</thead>
<tbody id="crmTable"></tbody>
</table>
</div>

<!-- Tasks -->
<div id="tasksTab" class="tab-content">
<h2>Tasks</h2>

<input id="taskInput" placeholder="المهمة">
<input id="taskClient" placeholder="العميل">

<select id="taskStage">
<option value="quote">تقديم عرض سعر</option>
<option value="follow">متابعة عرض السعر</option>
<option value="order">أمر توريد</option>
<option value="bank">البنك</option>
</select>

<button onclick="addTask()">إضافة</button>

<ul id="taskList"></ul>
</div>

</div>

<script>

// Tabs
function showTab(id,btn){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// CRM
let clients=[];

function addClient(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let status=document.getElementById("status").value;

clients.push({name,phone,status});
renderCRM();
}

function renderCRM(){
let table=document.getElementById("crmTable");
table.innerHTML="";
clients.forEach((c,i)=>{
table.innerHTML+=`
<tr>
<td>${c.name}</td>
<td>${c.phone}</td>
<td>${c.status}</td>
<td><button onclick="deleteClient(${i})">❌</button></td>
</tr>`;
});
}

function deleteClient(i){
clients.splice(i,1);
renderCRM();
}

// Tasks
let tasks=[];

function addTask(){
let txt=document.getElementById("taskInput").value;
let client=document.getElementById("taskClient").value;
let stage=document.getElementById("taskStage").value;

tasks.push({txt,client,stage});
renderTasks();
}

function renderTasks(){
let list=document.getElementById("taskList");
list.innerHTML="";

tasks.forEach(t=>{
let stageClass =
t.stage==="quote" ? "stage-quote" :
t.stage==="follow" ? "stage-follow" :
t.stage==="order" ? "stage-order" :
"stage-bank";

list.innerHTML+=`
<li>
<strong>${t.client}</strong>
<span class="task-stage ${stageClass}">${t.stage}</span>
<br>${t.txt}
</li>`;
});
}

</script>

</body>
</html>
