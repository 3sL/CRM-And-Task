<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Utopia Trading And Export Pro AI CRM & Tasks DEV By Eng.Mahmoud Mohamed Marie | Secure Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1e1e2f; --accent: #ffcc00; --success: #28a745; --danger: #dc3545; --info: #17a2b8; --ai-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:#f5f6fa; margin:0; display:flex; min-height:100vh; color:#333; overflow:hidden; }
        
        /* --- Login Screen Styling --- */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 20000; transition: 0.5s; }
        .login-card { background: #2e2e4d; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; color: white; }
        .login-card h2 { color: var(--accent); margin-bottom: 25px; font-size: 1.8em; }
        .login-card input { background: #3f3f6b; border: none; color: white; margin-bottom: 15px; padding: 15px; border-radius: 10px; width: 100%; box-sizing: border-box; outline: none; font-size: 16px; }
        .login-card button { background: var(--accent); color: var(--primary); border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .login-card button:disabled { background: #555; cursor: not-allowed; }
        
        .login-dev-info { margin-top: 30px; padding-top: 20px; border-top: 1px solid #3f3f6b; font-size: 0.85em; color: #bbb; }
        .login-dev-info b { color: var(--accent); display: block; margin-bottom: 5px; }
        .login-dev-info a { color: #25D366; text-decoration: none; font-weight: bold; }

        /* --- Main App UI --- */
        #mainApp { display: none; width: 100%; height: 100vh; flex-direction: row; }
        .sidebar { width:260px; background:var(--primary); color:#fff; display:flex; flex-direction:column; padding:20px; box-sizing:border-box; flex-shrink: 0; }
        .sidebar h2 { font-size:1.3em; margin-bottom:20px; color:var(--accent); text-align:center; border-bottom: 2px solid #2e2e4d; padding-bottom: 10px; }
        .sidebar button { background:#2e2e4d; color:#fff; border:none; padding:12px; margin:5px 0; border-radius:12px; cursor:pointer; font-weight:bold; transition: 0.3s; text-align: left; }
        .sidebar button.active { background:var(--accent); color:var(--primary); }
        
        .main { flex:1; padding:25px; box-sizing:border-box; overflow-y:auto; }
        .tab-content { display:none; animation:fadeIn 0.4s; }
        .tab-content.active { display:block; }
        
        input, select, textarea, .btn-save { padding:12px; margin:5px 0; width:100%; box-sizing:border-box; border-radius:10px; border:1px solid #ccc; outline:none; font-size: 14px; }
        .row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; }
        .btn-save { background: var(--success); color: white; font-weight: bold; cursor: pointer; border: none; font-size: 16px; transition: 0.3s; }
        
        /* --- Tracking Badges --- */
        .track-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; text-transform: uppercase; display: inline-block; }
        .track-new { background: #17a2b8; box-shadow: 0 0 8px #17a2b8; animation: pulse-ai 2s infinite; }
        
        @keyframes pulse-ai { 0% { transform: scale(1); } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); } }
        .voice-btn { background: #6f42c1; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; margin-left: 5px; }

        table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.05); margin-top: 20px; }
        th, td { padding:15px; text-align:center; border-bottom:1px solid #eee; }
        th { background:var(--primary); color:var(--accent); }

        #notification { position: fixed; top:20px; right:20px; padding:15px 30px; border-radius:12px; display:none; z-index:10000; color:#fff; font-weight:bold; }
        
        .dev-box { margin-top:auto; font-size:0.8em; border-top:1px solid #3f3f6b; padding-top:15px; color:#bbb; }
        .dev-link { color: #25D366; text-decoration: none; font-weight: bold; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="notification"></div>

<div id="loginOverlay">
    <div class="login-card">
        <h2>Utopia Trading And Export<small style="font-size: 10px; color: #00ff00;">SECURE</small></h2>
        <input type="text" id="userInput" placeholder="Username" autocomplete="off">
        <input type="password" id="passInput" placeholder="Password">
        <button id="loginBtn" onclick="checkLogin()">Login</button>
        <p id="loginError" style="color: var(--danger); margin-top: 10px; font-size: 0.8em; display: none;"></p>
        <div class="login-dev-info">
            <b>Dev By: Eng. Mahmoud Mohamed Marie</b>
            <a href="https://wa.me/201222153415">🟢 +201222153415</a>
        </div>
    </div>
</div>

<div id="mainApp">
    <div class="sidebar">
        <h2>Utopia CRM</h2>
        <button class="tab-btn active" onclick="showTab('crmTab', this)">👥 Clients Management</button>
        <button class="tab-btn" onclick="showTab('dashboardTab', this)">📊 AI Analytics</button>
        <button class="tab-btn" onclick="showTab('tasksTab', this)">📅 Tasks Board</button>
        <button class="tab-btn" onclick="showTab('recycleTab', this)" style="color: #ff9999;">♻️ Recycle Bin</button>
        
        <div style="background: #2e2e4d; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 0.75em;">
            <div id="aiStatusIndicator">🔵 AI Syncing...</div>
            <div id="backupReminder" style="color:var(--accent); display:none; margin-top:5px;">⚠️ Backup Needed!</div>
        </div>

        <div class="dev-box">
            <b>Developer Info:</b>
            Eng. Mahmoud Mohamed Marie
            <a href="https://wa.me/201222153415" class="dev-link">🟢 +201222153415</a>
            <button onclick="logout()" style="background: var(--danger); margin-top: 10px; width: 100%; text-align: center; border-radius: 8px; border:none; color:white; padding:8px; cursor:pointer;">Logout</button>
            <select id="language" onchange="changeLang(this.value)" style="margin-top: 15px; background: #2e2e4d; color: white; border: none; padding: 5px; width: 100%;">
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>
        </div>
    </div>

    <div class="main">
        <div id="crmTab" class="tab-content active">
            <h2 id="crmHeader">Clients Registry</h2>
            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px;">
                <input id="search" placeholder="🔍 Secure Search..." oninput="renderCRM()" style="border: 2px solid var(--accent); margin-bottom: 0; flex: 1;">
                <button class="voice-btn" onclick="startVoice('search')">🎤</button>
            </div>
            <div class="row">
                <div style="display:flex; align-items:center; flex:1;">
                    <input id="name" placeholder="Client Name">
                    <button class="voice-btn" onclick="startVoice('name')">🎤</button>
                </div>
                <input id="phone" placeholder="Phone Number">
                <select id="gov"></select>
                <select id="status">
                    <option value="Interested">Interested</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Hold">Hold</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>
            <textarea id="notes" placeholder="Notes..."></textarea>
            <button class="btn-save" onclick="addOrUpdate()">💾 Save Data (Encrypted Sync)</button>
            
            <div class="row" style="margin-top: 20px;">
                <div class="card" id="countAll">Total: 0</div>
                <div class="card" id="countHold" style="border-top-color: var(--danger);">Hold: 0</div>
            </div>
            <table>
                <thead>
                    <tr><th>Name</th><th>Phone</th><th>Gov</th><th>Tracking</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div id="dashboardTab" class="tab-content">
            <h2>📊 Analytics</h2>
            <div class="chart-box"><canvas id="statusChart"></canvas></div>
        </div>
        <div id="recycleTab" class="tab-content"><h2>♻️ Recycle Bin</h2><table><tbody id="recycleBody"></tbody></table></div>
        <div id="tasksTab" class="tab-content"><h2>📅 Tasks</h2><tbody id="taskBody"></tbody></div>
    </div>
</div>

<script>
// --- Configuration ---
const firebaseConfig = { apiKey: "AIzaSyBmOQuIUzd2qYB28kPFFaGbSFJ5yXCiMLY", authDomain: "crm-tasking.firebaseapp.com", databaseURL: "https://crm-tasking-default-rtdb.firebaseio.com", projectId: "crm-tasking", storageBucket: "crm-tasking.appspot.com", messagingSenderId: "368062369619", appId: "1:368062369619:web:cd38383ab75ab473961ba6" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let clients = [], loginAttempts = 0;

// --- SECURITY LOGIC ---
function sanitize(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function checkLogin() {
    const u = document.getElementById('userInput').value;
    const p = document.getElementById('passInput').value;
    const err = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    if (loginAttempts >= 5) {
        err.innerText = "Too many attempts. Locked for 30s.";
        err.style.display = 'block';
        btn.disabled = true;
        setTimeout(() => { btn.disabled = false; loginAttempts = 0; err.style.display = 'none'; }, 30000);
        return;
    }

    if (u === 'admin' && p === 'admin') {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        sessionStorage.setItem('crm_vault_auth', btoa('authenticated_session'));
    } else {
        loginAttempts++;
        err.innerText = `Invalid Credentials! (${loginAttempts}/5)`;
        err.style.display = 'block';
    }
}

// Session Check
if (sessionStorage.getItem('crm_vault_auth')) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('mainApp').style.display = 'flex';
}

function logout() { sessionStorage.clear(); location.reload(); }

// --- AI VOICE ---
function startVoice(tid) {
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = 'ar-SA';
    rec.onresult = (e) => { document.getElementById(tid).value = sanitize(e.results[0][0].transcript); if(tid==='search') renderCRM(); };
    rec.start();
}

// --- MAIN CRM LOGIC ---
function addOrUpdate() {
    const n = sanitize(document.getElementById('name').value);
    if(!n) return notify('Name Required', 'error');
    
    const clientData = {
        name: n,
        phone: sanitize(document.getElementById('phone').value),
        gov: document.getElementById('gov').value,
        status: document.getElementById('status').value,
        notes: sanitize(document.getElementById('notes').value),
        date: new Date().toISOString()
    };

    clients.push(clientData);
    db.ref('clients').set({...clients}).then(() => notify('Synced Successfully', 'success'));
    document.querySelectorAll('input').forEach(i => i.value = '');
}

function renderCRM() {
    const b = document.getElementById('tableBody'); b.innerHTML = '';
    const q = document.getElementById('search').value.toLowerCase();
    
    clients.forEach((c, i) => {
        if(q && !c.name.toLowerCase().includes(q)) return;
        b.innerHTML += `<tr>
            <td>${c.name}</td><td>${c.phone}</td><td>${c.gov}</td>
            <td><span class="track-badge track-new">Active</span></td>
            <td>${c.status}</td>
            <td><button onclick="deleteClient(${i})">✕</button></td>
        </tr>`;
    });
}

function notify(m, t) {
    const n = document.getElementById('notification');
    n.innerText = m; n.style.display = 'block';
    n.style.background = t === 'success' ? '#28a745' : '#dc3545';
    setTimeout(() => n.style.display = 'none', 3000);
}

// Initialize
db.ref('clients').on('value', s => { 
    clients = s.val() ? Object.values(s.val()) : []; 
    renderCRM();
    document.getElementById('aiStatusIndicator').innerText = "✅ Secured & Synced";
});

// Fill Govs (Original Logic)
const govs = ["Cairo", "Giza", "Alexandria"]; 
govs.forEach(g => document.getElementById('gov').innerHTML += `<option value="${g}">${g}</option>`);

</script>
</body>
</html>
