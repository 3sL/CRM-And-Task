<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>CRM System & Tasks For Utopia Trading And Export</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* --- General Styles --- */
body{font-family:Arial,sans-serif;background:#f5f6fa;margin:0;padding:0;display:flex;flex-direction:row;min-height:100vh;color:#333;overflow-x:hidden}
h2{margin-top:0;text-align:center}
/* --- Sidebar --- */
.sidebar{width:250px;background:#1e1e2f;color:#fff;display:flex;flex-direction:column;padding:20px;box-sizing:border-box;transition:all 0.3s ease}
.sidebar h2{font-size:1.5em;margin-bottom:20px;color:#ffcc00}
.sidebar button{background:#2e2e4d;color:#fff;border:none;padding:12px;margin:5px 0;border-radius:12px;cursor:pointer;text-align:right;font-weight:bold;transition:all 0.2s ease}
.sidebar button:hover{background:#3f3f6b}
.sidebar button.active{background:#ffcc00;color:#1e1e2f}
.sidebar select{padding:10px;border-radius:8px;border:none;margin-top:10px}
/* --- Tabs --- */
.tabs-content{flex:1;padding:25px;overflow:auto;width:100%;box-sizing:border-box;min-width:0}
.tab-content{animation:fadeIn 0.3s ease;display:none}
.tab-content.active{display:block}
/* --- Inputs & Buttons --- */
input,select,textarea,button{padding:12px;margin:5px 0;width:100%;box-sizing:border-box;border-radius:8px;border:1px solid #ccc;outline:none}
textarea{resize:none;height:80px}
button{background:#007bff;color:#fff;border:none;cursor:pointer;font-weight:bold;transition:0.2s}
/* --- Cards --- */
.card{background:#fff;padding:15px;text-align:center;border-radius:12px;margin:5px;flex:1;box-shadow:0 4px 6px rgba(0,0,0,0.1);font-weight:bold}
.row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
/* --- Table --- */
table{width:100%;border-collapse:collapse;margin-top:15px;table-layout: fixed;background:#fff;border-radius:12px;overflow-x:auto;display:block;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
th,td{border-bottom:1px solid #eee;padding:12px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
th{background:#1e1e2f;color:#ffcc00;font-weight:bold}
/* --- Notifications --- */
#notification{position:fixed;top:20px;right:20px;background:#ffcc00;color:#1e1e2f;padding:15px 20px;border-radius:12px;display:none;z-index:999;min-width:220px;font-weight:bold;box-shadow:0 4px 8px rgba(0,0,0,0.2);cursor:pointer}
/* --- Task Stages --- */
.task-stage{padding:5px 10px;color:#fff;border-radius:12px;font-weight:bold;font-size:0.9em}
.stage-quote{background:#ff7f50}
.stage-follow{background:#1e90ff}
.stage-order{background:#28a745}
.stage-bank{background:#6f42c1}
/* --- Logo --- */
.logo-container{text-align:center;margin-bottom:20px}
.logo-container img{max-width:100%;height:auto;display:inline-block;border-radius:12px}
/* --- Responsive --- */
@media(max-width:768px){body{flex-direction:column}.sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:10px}.sidebar h2{font-size:1em;margin-bottom:0;white-space:nowrap;flex:1 0 auto}.sidebar button{flex:1 0 auto;margin:0 5px;white-space:nowrap;font-size:0.9em;padding:8px}.sidebar select{width:auto;margin-left:10px;font-size:0.9em}.tabs-content{padding:10px;width:100%}table{width:100%;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}th,td{white-space:nowrap;font-size:0.8em;padding:6px}.row{flex-direction:column}input,select,textarea,button{font-size:0.9em}.card{flex:1 1 100%;margin-bottom:10px}.logo-container img{max-height:80px}}
/* --- Animations --- */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
<div class="sidebar">
<h2 id="title">CRM System & Tasks For Utopia Trading And Export</h2>
<button class="tab-btn active" onclick="showTab('crmTab', this)" id="crmBtn">CRM</button>
<button class="tab-btn" onclick="showTab('tasksTab', this)" id="tasksBtn">Tasks</button>
<hr>
<div class="developer" id="devText">Developed by Eng : <strong>Mahmoud Mohamed Marie</strong></div>
<div class="phone">📞 +201222153415</div>
<select id="language" onchange="changeLang(this.value)">
<option value="en">English</option>
<option value="ar">عربي</option>
</select>
</div>

<div class="tabs-content">
<div id="notification"></div>

<!-- CRM Tab -->
<div id="crmTab" class="tab-content active">
<div class="logo-container"><img src="logo.png" alt="Company Logo"></div>
<h2 id="crmHeader">CRM System</h2>
<div class="row">
<input id="universalSearch" placeholder="Search Any Column..." oninput="renderCRM()">
</div>
<div class="row">
<input id="name" placeholder="Client Name">
<input id="phone" placeholder="Phone">
<select id="governorate"></select>
<input type="date" id="date">
<select id="status">
<option value="Interested">Interested</option>
<option value="In Progress">In Progress</option>
<option value="Hold">Hold</option>
<option value="Completed">Completed</option>
</select>
<textarea id="notes" placeholder="Notes"></textarea>
<input id="agent" placeholder="Agent Name">
<input type="number" id="reminderDays" placeholder="Reminder Days">
<input type="text" id="followUp" placeholder="Follow Up">
</div>
<button onclick="addOrUpdate()" id="saveBtn">💾 Save</button>
<button onclick="exportPDFWithArabicSupport()" id="exportBtn">📄 Export PDF</button>
<div class="row">
<div class="card" id="total">0</div>
<div class="card" id="hold">Hold: 0</div>
</div>
<table>
<thead>
<tr>
<th id="thName">Name</th><th id="thPhone">Phone</th><th id="thGovernorate">Governorate</th><th id="thDate">Date</th><th id="thStatus">Status</th><th id="thNotes">Notes</th><th id="thReminder">Reminder</th><th id="thFollowUp">Follow Up</th><th id="thWhatsApp">WhatsApp</th><th id="thTrack">Track</th><th id="thEdit">Edit</th><th id="thDelete">Delete</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<!-- Tasks Tab -->
<div id="tasksTab" class="tab-content">
<div class="logo-container"><img src="logo.png" alt="Company Logo"></div>
<h2 id="tasksHeader">Tasks</h2>
<div class="row">
<input id="taskInput" placeholder="Task Text">
<select id="taskClient"><option value="">Select Client</option></select>
<select id="taskGovernorate"></select>
<input type="date" id="taskDate">
<select id="taskStage">
<option value="quote">Quote</option>
<option value="follow">Follow Up</option>
<option value="order">Order</option>
<option value="bank">Bank</option>
</select>
<button onclick="addTask()" id="addTaskBtn">➕ Add Task</button>
</div>
<table>
<thead>
<tr>
<th id="thTaskClient">Client</th><th id="thTaskGovernorate">Governorate</th><th id="thTaskDate">Date</th><th id="thTaskStage">Stage</th><th id="thTaskText">Task</th><th id="thTaskEdit">Edit</th><th id="thTaskDelete">Delete</th></tr>
</thead>
<tbody id="taskList"></tbody>
</table>
</div>
</div>

<audio id="notifSoundQuote" src="notif_quote.mp3" preload="auto"></audio>
<audio id="notifSoundFollow" src="notif_follow.mp3" preload="auto"></audio>
<audio id="notifSoundOrder" src="notif_order.mp3" preload="auto"></audio>
<audio id="notifSoundBank" src="notif_bank.mp3" preload="auto"></audio>

<script>
// --- Firebase ---
const firebaseConfig = { /* ضع إعداداتك هنا */ };
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// --- Tabs ---
function showTab(id,btn){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

// --- Notification ---
function showNotification(msg){
const notif=document.getElementById('notification');
notif.innerHTML=msg;
notif.style.display='block';
document.getElementById('notifSoundQuote').play();
setTimeout(()=>{notif.style.display='none';},4000);
}

// --- Governorates ---
const governorates=[
  "Cairo","Alexandria","Giza","Qalyubia","Gharbia","Dakahlia","Sharqia",
  "Beheira","Fayoum","Menofia","Assiut","Sohag","Minya","Beni Suef",
  "Luxor","Aswan","Red Sea","New Valley","Ismailia","Suez","North Sinai",
  "South Sinai","Port Said","Damietta","Kafr El Sheikh","Matrouh","Qena",
  "Helwan","Marsa Matrouh"
];
function populateGovernorates(){
  const sel=document.getElementById('governorate');
  const taskSel=document.getElementById('taskGovernorate');
  sel.innerHTML='<option value="">Select Governorate</option>';
  taskSel.innerHTML='<option value="">Select Governorate</option>';
  governorates.forEach(g=>{
    sel.innerHTML+=`<option value="${g}">${g}</option>`;
    taskSel.innerHTML+=`<option value="${g}">${g}</option>`;
  });
}
populateGovernorates();

// --- Language Texts ---
const texts={
en:{title:"CRM System & Tasks For Utopia Trading And Export",crm:"CRM",tasks:"Tasks",dev:"Developed by Eng : ",search:"Search Any Column...",clientName:"Client Name",phone:"Phone",governorate:"Governorate",date:"Date",statusOptions:["Interested","In Progress","Hold","Completed"],notes:"Notes",agent:"Agent Name",reminder:"Reminder Days",follow:"Follow Up",save:"💾 Save",export:"📄 Export PDF",total:"Total",hold:"Hold",taskText:"Task Text",selectClient:"Select Client",addTask:"➕ Add Task"},
ar:{title:"نظام إدارة العملاء والمهام لشركة يوتوبيا للتجارة والتصدير",crm:"نظام العملاء",tasks:"المهام",dev:"تم التطوير بواسطة : ",search:"ابحث في أي عمود...",clientName:"اسم العميل",phone:"الهاتف",governorate:"المحافظة",date:"التاريخ",statusOptions:["مهتم","قيد التنفيذ","معلق","مكتمل"],notes:"ملاحظات",agent:"اسم الموظف",reminder:"أيام التذكير",follow:"المتابعة",save:"💾 حفظ",export:"📄 تصدير PDF",total:"الإجمالي",hold:"معلق",taskText:"المهمة",selectClient:"اختر العميل",addTask:"➕ إضافة مهمة"}
};

// --- Change Language ---
function changeLang(lang){
document.documentElement.lang=lang;
document.documentElement.dir=(lang==='ar')?'rtl':'ltr';
const t=texts[lang];
document.getElementById('title').innerText=t.title;
document.getElementById('crmBtn').innerText=t.crm;
document.getElementById('tasksBtn').innerText=t.tasks;
document.getElementById('devText').innerHTML=t.dev+'<strong>Mahmoud Mohamed Marie</strong>';
document.getElementById('universalSearch').placeholder=t.search;
document.getElementById('name').placeholder=t.clientName;
document.getElementById('phone').placeholder=t.phone;
document.getElementById('governorate').options[0].text=t.governorate;
populateGovernorates(); // <-- إعادة تعبئة المحافظات بعد تغيير اللغة
for(let i=0;i<document.getElementById('status').options.length;i++){
document.getElementById('status').options[i].text=t.statusOptions[i];
}
document.getElementById('notes').placeholder=t.notes;
document.getElementById('agent').placeholder=t.agent;
document.getElementById('reminderDays').placeholder=t.reminder;
document.getElementById('followUp').placeholder=t.follow;
document.getElementById('saveBtn').innerText=t.save;
document.getElementById('exportBtn').innerText=t.export;
document.getElementById('taskInput').placeholder=t.taskText;
document.getElementById('taskClient').options[0].text=t.selectClient;
document.getElementById('addTaskBtn').innerText=t.addTask;
document.getElementById('crmHeader').innerText=t.crm;
document.getElementById('tasksHeader').innerText=t.tasks;
}

// --- CRUD & PDF Functions ---
let clients=[],editIndex=-1,tasks=[],taskEditIndex=-1;

// Load Clients
function loadClientsFromFirebase(){
db.ref('clients').on('value',snapshot=>{
clients=snapshot.val()?Object.values(snapshot.val()):[];
renderCRM();
populateClientDropdown();
});
}

// Render CRM
function renderCRM(){
const table=document.getElementById('table');
const search=document.getElementById('universalSearch').value.toLowerCase();
table.innerHTML='';
clients.forEach((c,i)=>{
if(c.name.toLowerCase().includes(search) || c.phone.toLowerCase().includes(search) || c.notes.toLowerCase().includes(search)){
const row=document.createElement('tr');
row.innerHTML=`<td>${c.name}</td><td>${c.phone}</td><td>${c.governorate}</td><td>${c.date}</td><td>${c.status}</td><td>${c.notes}</td><td>${c.reminderDays}</td><td>${c.followUp}</td>
<td><a href="https://wa.me/${c.phone}" target="_blank">WA</a></td>
<td><button onclick="trackClient(${i})">Track</button></td>
<td><button onclick="editClient(${i})">Edit</button></td>
<td><button onclick="deleteClient(${i})">Delete</button></td>`;
table.appendChild(row);
}
});
document.getElementById('total').innerText=`${texts[document.documentElement.lang].total}: ${clients.length}`;
const holdCount=clients.filter(c=>c.status===texts[document.documentElement.lang].statusOptions[2]).length;
document.getElementById('hold').innerText=`${texts[document.documentElement.lang].hold}: ${holdCount}`;
}

// Add / Update Client
function addOrUpdate(){
const client={name:document.getElementById('name').value,phone:document.getElementById('phone').value,governorate:document.getElementById('governorate').value,date:document.getElementById('date').value,status:document.getElementById('status').value,notes:document.getElementById('notes').value,agent:document.getElementById('agent').value,reminderDays:document.getElementById('reminderDays').value,followUp:document.getElementById('followUp').value};
if(editIndex===-1) clients.push(client); else clients[editIndex]=client;
db.ref('clients').set(clients);
renderCRM();
populateClientDropdown();
clearClientForm();
showNotification('Saved Successfully');
}

// Edit Client
function editClient(i){
editIndex=i;
const c=clients[i];
document.getElementById('name').value=c.name;
document.getElementById('phone').value=c.phone;
document.getElementById('governorate').value=c.governorate;
document.getElementById('date').value=c.date;
document.getElementById('status').value=c.status;
document.getElementById('notes').value=c.notes;
document.getElementById('agent').value=c.agent;
document.getElementById('reminderDays').value=c.reminderDays;
document.getElementById('followUp').value=c.followUp;
}

// Delete Client
function deleteClient(i){
if(confirm('Are you sure?')){clients.splice(i,1);db.ref('clients').set(clients);renderCRM();populateClientDropdown();showNotification('Deleted Successfully');}
}

// Clear Form
function clearClientForm(){
document.getElementById('name').value='';
document.getElementById('phone').value='';
document.getElementById('governorate').
  .value='';
document.getElementById('date').value='';
document.getElementById('status').selectedIndex=0;
document.getElementById('notes').value='';
document.getElementById('agent').value='';
document.getElementById('reminderDays').value='';
document.getElementById('followUp').value='';
editIndex=-1;
}

// Track Client on Map
function trackClient(i){
const c = clients[i];
if(c.governorate){
window.open(`https://www.google.com/maps/search/${encodeURIComponent(c.governorate)}`,'_blank');
} else {
alert('No governorate selected for this client');
}
}

// Populate Client Dropdown for Tasks
function populateClientDropdown(){
const sel=document.getElementById('taskClient');
sel.innerHTML=`<option value="">${texts[document.documentElement.lang].selectClient}</option>`;
clients.forEach((c,i)=>{
sel.innerHTML+=`<option value="${i}">${c.name}</option>`;
});
}

// Export PDF
function exportPDFWithArabicSupport(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
const columns = ["Name","Phone","Governorate","Date","Status","Notes","Reminder","Follow Up"];
const rows = clients.map(c=>[c.name,c.phone,c.governorate,c.date,c.status,c.notes,c.reminderDays,c.followUp]);
doc.autoTable({head:[columns],body:rows});
doc.save("CRM_Data.pdf");
}

// --- Tasks ---
function addTask(){
const idx=document.getElementById('taskClient').value;
const clientName=idx!==""?clients[idx].name:"";
const task={client:clientName,governorate:document.getElementById('taskGovernorate').value,date:document.getElementById('taskDate').value,stage:document.getElementById('taskStage').value,text:document.getElementById('taskInput').value};
if(taskEditIndex===-1) tasks.push(task); else tasks[taskEditIndex]=task;
db.ref('tasks').set(tasks);
renderTasks();
clearTaskForm();
showNotification('Task Saved');
}

// Render Tasks
function renderTasks(){
const tbody=document.getElementById('taskList');
tbody.innerHTML='';
tasks.forEach((t,i)=>{
const row=document.createElement('tr');
row.innerHTML=`<td>${t.client}</td><td>${t.governorate}</td><td>${t.date}</td>
<td><span class="task-stage ${t.stage}">${t.stage}</span></td>
<td>${t.text}</td>
<td><button onclick="editTask(${i})">Edit</button></td>
<td><button onclick="deleteTask(${i})">Delete</button></td>`;
tbody.appendChild(row);
});
}

// Edit Task
function editTask(i){
taskEditIndex=i;
const t=tasks[i];
document.getElementById('taskClient').value=clients.findIndex(c=>c.name===t.client);
document.getElementById('taskGovernorate').value=t.governorate;
document.getElementById('taskDate').value=t.date;
document.getElementById('taskStage').value=t.stage;
document.getElementById('taskInput').value=t.text;
}

// Delete Task
function deleteTask(i){
if(confirm('Are you sure?')){
tasks.splice(i,1);
db.ref('tasks').set(tasks);
renderTasks();
showNotification('Task Deleted');
}
}

// Clear Task Form
function clearTaskForm(){
document.getElementById('taskClient').selectedIndex=0;
document.getElementById('taskGovernorate').selectedIndex=0;
document.getElementById('taskDate').value='';
document.getElementById('taskStage').selectedIndex=0;
document.getElementById('taskInput').value='';
taskEditIndex=-1;
}

// Load Tasks
function loadTasksFromFirebase(){
db.ref('tasks').on('value',snapshot=>{
tasks=snapshot.val()?Object.values(snapshot.val()):[];
renderTasks();
});
}

// --- Init ---
loadClientsFromFirebase();
loadTasksFromFirebase();
changeLang('en'); // default language
</script>
</body>
</html>
