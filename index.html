<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>CRM System & Tasks For Utopia Trading And Export</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:#f5f6fa; margin:0; padding:0; display:flex; flex-direction:row; min-height:100vh; color:#333; overflow-x:hidden; }
h2 { margin-top:0; text-align:center; }
.sidebar { width:250px; background:#1e1e2f; color:#fff; display:flex; flex-direction:column; padding:20px; box-sizing:border-box; transition: all 0.3s ease; }
.sidebar h2 { font-size:1.5em; margin-bottom:20px; color:#ffcc00; }
.sidebar button { background:#2e2e4d; color:#fff; border:none; padding:12px; margin:5px 0; border-radius:12px; cursor:pointer; text-align:right; font-weight:bold; transition: all 0.2s ease; }
.sidebar button:hover { background:#3f3f6b; }
.sidebar button.active { background:#ffcc00; color:#1e1e2f; }
.sidebar select { padding:10px; border-radius:8px; border:none; margin-top:10px; }
.tabs-content { flex:1; padding:25px; overflow:auto; width:100%; box-sizing:border-box; min-width:0; }
.tab-content { animation:fadeIn 0.3s ease; display:none; }
.tab-content.active { display:block; }
input, select, textarea, button { padding:12px; margin:5px 0; width:100%; box-sizing:border-box; border-radius:8px; border:1px solid #ccc; outline:none; }
textarea { resize:none; height:80px; }
button { background:#007bff; color:#fff; border:none; cursor:pointer; font-weight:bold; transition:0.2s; }
.card { background:#fff; padding:15px; text-align:center; border-radius:12px; margin:5px; flex:1; box-shadow:0 4px 6px rgba(0,0,0,0.1); font-weight:bold; }
.row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
table { width:100%; border-collapse:collapse; margin-top:15px; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
th, td { border-bottom:1px solid #eee; padding:12px; text-align:center; }
th { background:#1e1e2f; color:#ffcc00; font-weight:bold; }
#notification { position: fixed; top:20px; right:20px; background:#ffcc00; color:#1e1e2f; padding:15px 20px; border-radius:12px; display:none; z-index:999; min-width:220px; font-weight:bold; box-shadow:0 4px 8px rgba(0,0,0,0.2); cursor:pointer; }
.task-stage { padding:5px 10px; color:#fff; border-radius:12px; font-weight:bold; font-size:0.9em; }
.stage-quote { background:#ff7f50; }
.stage-follow { background:#1e90ff; }
.stage-order { background:#28a745; }
.stage-bank { background:#6f42c1; }
@media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 10px; } .sidebar h2 { display:none; } .tabs-content { padding: 10px; } table { display: block; overflow-x: auto; } }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="notification"></div>

<div class="sidebar">
  <h2 data-lang-key="title">Utopia CRM</h2>
  <button class="tab-btn active" onclick="showTab('crmTab', this)" data-lang-key="crm">CRM</button>
  <button class="tab-btn" onclick="showTab('tasksTab', this)" data-lang-key="tasks">Tasks</button>
  <hr>
  <div style="font-size:0.8em; text-align:center; opacity:0.8">Developed by Eng: Mahmoud Marie</div>
  <select id="language" onchange="changeLang(this.value)">
    <option value="en">English</option>
    <option value="ar">عربي</option>
  </select>
</div>

<div class="tabs-content">
  <div id="crmTab" class="tab-content active">
    <h2 data-lang-key="crm_title">CRM System</h2>
    <div class="row">
      <input id="universalSearch" placeholder="Search..." oninput="renderCRM()">
    </div>
    <div class="row">
      <input id="name" placeholder="Client Name">
      <input id="phone" placeholder="Phone">
      <input type="date" id="date">
      <select id="status">
        <option value="Interested">Interested</option>
        <option value="In Progress">In Progress</option>
        <option value="Hold">Hold</option>
        <option value="Completed">Completed</option>
      </select>
      <textarea id="notes" placeholder="Notes"></textarea>
      <input id="agent" placeholder="Agent Name">
      <input type="number" id="reminderDays" placeholder="Reminder Days">
      <input type="text" id="followUp" placeholder="Follow Up">
    </div>
    <button onclick="addOrUpdate()" id="saveBtn">💾 Save</button>
    <div class="row">
      <div class="card" id="total">Total: 0</div>
      <div class="card" id="hold">Hold: 0</div>
    </div>
    <table>
      <thead>
        <tr>
          <th data-lang-key="name">Name</th><th data-lang-key="phone">Phone</th><th>Status</th><th>Notes</th><th>WhatsApp</th><th>Edit</th><th>Delete</th>
        </tr>
      </thead>
      <tbody id="crmTable"></tbody>
    </table>
  </div>

  <div id="tasksTab" class="tab-content">
    <h2 data-lang-key="tasks_title">Tasks</h2>
    <div class="row">
      <input id="taskInput" placeholder="Task Text">
      <select id="taskClient"><option value="">Select Client</option></select>
      <input type="date" id="taskDate">
      <select id="taskStage">
        <option value="quote">Quote</option>
        <option value="follow">Follow Up</option>
        <option value="order">Order</option>
        <option value="bank">Bank</option>
      </select>
      <button onclick="addTask()">➕ Add Task</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Client</th><th>Date</th><th>Stage</th><th>Task</th><th>Edit</th><th>Delete</th>
        </tr>
      </thead>
      <tbody id="taskList"></tbody>
    </table>
  </div>
</div>

<script>
// Firebase Initialization
const firebaseConfig = { 
    apiKey: "AIzaSyBmOQuIUzd2qYB28kPFFaGbSFJ5yXCiMLY", 
    authDomain: "crm-tasking.firebaseapp.com", 
    databaseURL: "https://crm-tasking-default-rtdb.firebaseio.com", 
    projectId: "crm-tasking", 
    storageBucket: "crm-tasking.appspot.com", 
    messagingSenderId: "368062369619", 
    appId: "1:368062369619:web:cd38383ab75ab473961ba6" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let editId = null;
let taskEditId = null;
let clientsData = {};
let tasksData = {};
let lang = 'en';

// Real-time Sync
window.onload = () => {
    db.ref('clients').on('value', snapshot => {
        clientsData = snapshot.val() || {};
        renderCRM();
        updateClientDropdown();
    });
    db.ref('tasks').on('value', snapshot => {
        tasksData = snapshot.val() || {};
        renderTasks();
    });
};

function showTab(id, btn){
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
}

// CRM Logic
function addOrUpdate(){
    const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        date: document.getElementById('date').value,
        status: document.getElementById('status').value,
        notes: document.getElementById('notes').value,
        agent: document.getElementById('agent').value,
        reminderDays: document.getElementById('reminderDays').value,
        followUp: document.getElementById('followUp').value
    };

    if(!data.name) return alert("Please enter name");

    if(editId){
        db.ref('clients/' + editId).update(data);
        editId = null;
        document.getElementById('saveBtn').innerText = "💾 Save";
    } else {
        db.ref('clients').push(data);
    }
    clearInputs(['name','phone','date','notes','agent','reminderDays','followUp']);
}

function renderCRM(){
    const tbody = document.getElementById('crmTable');
    const search = document.getElementById('universalSearch').value.toLowerCase();
    tbody.innerHTML = '';
    let total = 0, hold = 0;

    for(let id in clientsData){
        const c = clientsData[id];
        if(search && !c.name.toLowerCase().includes(search)) continue;
        
        total++;
        if(c.status === "Hold") hold++;

        const row = `<tr>
            <td>${c.name}</td><td>${c.phone}</td><td>${c.status}</td><td>${c.notes}</td>
            <td><button onclick="window.open('https://wa.me/${c.phone}')">💬</button></td>
            <td><button onclick="editClient('${id}')">✏️</button></td>
            <td><button onclick="deleteClient('${id}')" style="background:red">🗑️</button></td>
        </tr>`;
        tbody.innerHTML += row;
    }
    document.getElementById('total').innerText = "Total: " + total;
    document.getElementById('hold').innerText = "Hold: " + hold;
}

function editClient(id){
    const c = clientsData[id];
    editId = id;
    document.getElementById('name').value = c.name;
    document.getElementById('phone').value = c.phone;
    document.getElementById('status').value = c.status;
    document.getElementById('notes').value = c.notes;
    document.getElementById('saveBtn').innerText = "Update Client";
}

function deleteClient(id){
    if(confirm("Delete this client?")) db.ref('clients/' + id).remove();
}

// Tasks Logic
function addTask(){
    const data = {
        text: document.getElementById('taskInput').value,
        client: document.getElementById('taskClient').value,
        date: document.getElementById('taskDate').value,
        stage: document.getElementById('taskStage').value
    };
    if(!data.text) return alert("Task text required");
    db.ref('tasks').push(data);
    document.getElementById('taskInput').value = '';
}

function renderTasks(){
    const tbody = document.getElementById('taskList');
    tbody.innerHTML = '';
    for(let id in tasksData){
        const t = tasksData[id];
        tbody.innerHTML += `<tr>
            <td>${t.client}</td><td>${t.date}</td>
            <td><span class="task-stage stage-${t.stage}">${t.stage}</span></td>
            <td>${t.text}</td>
            <td><button onclick="editTask('${id}')">✏️</button></td>
            <td><button onclick="deleteTask('${id}')" style="background:red">🗑️</button></td>
        </tr>`;
    }
}

function deleteTask(id){
    if(confirm("Delete task?")) db.ref('tasks/' + id).remove();
}

function updateClientDropdown(){
    const sel = document.getElementById('taskClient');
    sel.innerHTML = '<option value="">Select Client</option>';
    for(let id in clientsData){
        const name = clientsData[id].name;
        sel.innerHTML += `<option value="${name}">${name}</option>`;
    }
}

function clearInputs(ids){ ids.forEach(id => document.getElementById(id).value = ''); }

function changeLang(l){
    document.body.dir = (l === 'ar' ? 'rtl' : 'ltr');
}
</script>
</body>
</html>
