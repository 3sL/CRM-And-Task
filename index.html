<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Utopia Trading Programs CRM & Tasks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --primary: #1e1e2f; --accent: #ffcc00; --success: #28a745; --danger: #dc3545; --info: #17a2b8; }
        body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:#f5f6fa; margin:0; display:flex; min-height:100vh; color:#333; overflow:hidden; }
        
        /* --- Login Screen Styling --- */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 20000; transition: 0.5s; }
        .login-card { background: #2e2e4d; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; color: white; }
        .login-card h2 { color: var(--accent); margin-bottom: 25px; font-size: 1.8em; }
        .login-card input { background: #3f3f6b; border: none; color: white; margin-bottom: 15px; padding: 15px; border-radius: 10px; width: 100%; box-sizing: border-box; outline: none; font-size: 16px; }
        .login-card button { background: var(--accent); color: var(--primary); border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .login-card button:hover { opacity: 0.9; transform: scale(1.02); }
        
        .login-dev-info { margin-top: 30px; padding-top: 20px; border-top: 1px solid #3f3f6b; font-size: 0.85em; color: #bbb; }
        .login-dev-info b { color: var(--accent); display: block; margin-bottom: 5px; }
        .login-dev-info a { color: #25D366; text-decoration: none; font-weight: bold; }

        /* --- Main App UI --- */
        #mainApp { display: none; width: 100%; height: 100vh; flex-direction: row; }
        .sidebar { width:260px; background:var(--primary); color:#fff; display:flex; flex-direction:column; padding:20px; box-sizing:border-box; flex-shrink: 0; }
        .sidebar h2 { font-size:1.3em; margin-bottom:20px; color:var(--accent); text-align:center; border-bottom: 2px solid #2e2e4d; padding-bottom: 10px; }
        .sidebar button { background:#2e2e4d; color:#fff; border:none; padding:12px; margin:5px 0; border-radius:12px; cursor:pointer; font-weight:bold; transition: 0.3s; text-align: left; }
        .sidebar button.active { background:var(--accent); color:var(--primary); }
        
        .dev-box { margin-top:auto; font-size:0.8em; border-top:1px solid #3f3f6b; padding-top:15px; color:#bbb; }
        .dev-box b { color: var(--accent); display: block; margin-bottom: 5px; }
        .dev-link { color: #25D366; text-decoration: none; font-weight: bold; font-size: 1.1em; display: block; }

        .main { flex:1; padding:25px; box-sizing:border-box; overflow-y:auto; }
        .tab-content { display:none; animation:fadeIn 0.4s; }
        .tab-content.active { display:block; }
        
        input, select, textarea, .btn-save { padding:12px; margin:5px 0; width:100%; box-sizing:border-box; border-radius:10px; border:1px solid #ccc; outline:none; font-size: 14px; }
        .row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; }
        .row > * { flex: 1; min-width: 180px; }
        .btn-save { background: var(--success); color: white; font-weight: bold; cursor: pointer; border: none; font-size: 16px; transition: 0.3s; }
        
        /* Export Button Style */
        .btn-export { background: #6c757d; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
        .btn-export:hover { background: #5a6268; }

        table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.05); margin-top: 20px; }
        th, td { padding:15px; text-align:center; border-bottom:1px solid #eee; }
        th { background:var(--primary); color:var(--accent); text-transform: uppercase; font-size: 12px; }
        
        .status-interested { background: #e3f2fd !important; }
        .status-inprogress { background: #fff3e0 !important; }
        .status-hold { background: #ffebee !important; }
        .status-completed { background: #e8f5e9 !important; }
        
        #notification { position: fixed; top:20px; right:20px; padding:15px 30px; border-radius:12px; display:none; z-index:10000; color:#fff; font-weight:bold; box-shadow:0 10px 20px rgba(0,0,0,0.2); }
        .card { background:#fff; padding:20px; text-align:center; border-radius:12px; flex:1; font-weight:bold; border-top: 5px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
        @media (max-width: 768px) { body { flex-direction: column; overflow: auto; } #mainApp { flex-direction: column; } .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; } .dev-box { display: none; } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="notification"></div>

<div id="loginOverlay">
    <div class="login-card">
        <h2>Utopia CRM</h2>
        <input type="text" id="userInput" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="checkLogin()">Login</button>
        <p id="loginError" style="color: var(--danger); margin-top: 10px; font-size: 0.8em; display: none;">Invalid Credentials!</p>
        <div class="login-dev-info">
            <b>Dev By: Eng. Mahmoud Mohamed Marie</b>
            <a href="https://wa.me/201222153415">🟢 +201222153415</a>
        </div>
    </div>
</div>

<div id="mainApp">
    <div class="sidebar">
        <h2>Utopia CRM</h2>
        <button class="tab-btn active" onclick="showTab('crmTab', this)">👥 Clients Management</button>
        <button class="tab-btn" onclick="showTab('tasksTab', this)">📅 Tasks Board</button>
        <div class="dev-box">
            <b>Developer Info:</b>
            Eng. Mahmoud Mohamed Marie
            <a href="https://wa.me/201222153415" class="dev-link">🟢 +201222153415</a>
            <button onclick="logout()" style="background: var(--danger); margin-top: 10px; width: 100%; text-align: center; border-radius: 8px;">Logout</button>
            <select id="language" onchange="changeLang(this.value)" style="margin-top: 15px; background: #2e2e4d; color: white; border: none; padding: 5px;">
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>
        </div>
    </div>

    <div class="main">
        <div id="crmTab" class="tab-content active">
            <h2 id="crmHeader">Clients Registry</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input id="search" placeholder="🔍 Search..." oninput="renderCRM()" style="border: 2px solid var(--accent); margin-bottom: 20px; flex: 1;">
                <button class="btn-export" onclick="exportData('clients')">📤 Export Excel</button>
            </div>
            <div class="row">
                <input id="name" placeholder="Client Name">
                <input id="phone" placeholder="Phone Number">
                <select id="gov"></select>
                <select id="status">
                    <option value="Interested">Interested</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Hold">Hold</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>
            <div class="row">
                <textarea id="notes" placeholder="Notes..."></textarea>
                <div style="display:flex; flex-direction:column; gap:5px; flex:1;">
                    <input id="agent" placeholder="Agent">
                    <input id="followUp" placeholder="Action">
                    <input type="date" id="date">
                </div>
            </div>
            <button class="btn-save" onclick="addOrUpdate()">💾 Save Data</button>
            <div class="row" style="margin-top: 20px;">
                <div class="card" id="countAll">Total: 0</div>
                <div class="card" id="countHold" style="border-top-color: var(--danger);">Hold: 0</div>
            </div>
            <table>
                <thead><tr><th>Name</th><th>Phone</th><th>Gov</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="tasksTab" class="tab-content">
            <h2>Operations Tasks</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input id="taskSearch" placeholder="🔍 Filter..." oninput="renderTasks()" style="border: 2px solid var(--info); margin-bottom: 20px; flex: 1;">
                <button class="btn-export" onclick="exportData('tasks')" style="background: #17a2b8;">📤 Export Tasks</button>
            </div>
            <div class="row">
                <input id="taskText" placeholder="Task details">
                <select id="taskClientSelect"><option value="">Client</option></select>
                <input type="date" id="taskDate">
                <select id="taskStage">
                    <option value="quote">Quote</option><option value="follow">Follow Up</option>
                    <option value="order">Order</option><option value="bank">Bank</option>
                </select>
                <button onclick="addTask()" style="background:var(--info); color:white; border:none; border-radius:10px; cursor:pointer; padding: 0 15px;">➕</button>
            </div>
            <table>
                <thead><tr><th>Client</th><th>Task</th><th>Deadline</th><th>Stage</th><th>Del</th></tr></thead>
                <tbody id="taskBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyBmOQuIUzd2qYB28kPFFaGbSFJ5yXCiMLY", authDomain: "crm-tasking.firebaseapp.com", databaseURL: "https://crm-tasking-default-rtdb.firebaseio.com", projectId: "crm-tasking", storageBucket: "crm-tasking.appspot.com", messagingSenderId: "368062369619", appId: "1:368062369619:web:cd38383ab75ab473961ba6" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let clients = [], tasks = [], editIdx = -1, lang = 'en';
const govs = [{en:"Cairo", ar:"القاهرة"}, {en:"Giza", ar:"الجيزة"}, {en:"Alexandria", ar:"الإسكندرية"}, {en:"Dakahlia", ar:"الدقهلية"}, {en:"Sharkia", ar:"الشرقية"}, {en:"Monufia", ar:"المنوفية"}, {en:"Gharbia", ar:"الغربية"}, {en:"Kafr El Sheikh", ar:"كفر الشيخ"}, {en:"Beheira", ar:"البحيرة"}, {en:"Damietta", ar:"دمياط"}, {en:"Port Said", ar:"بورسعيد"}, {en:"Ismailia", ar:"الإسماعيلية"}, {en:"Suez", ar:"السويس"}, {en:"Beni Suef", ar:"بني سويف"}, {en:"Fayoum", ar:"الفيوم"}, {en:"Minya", ar:"المنيا"}, {en:"Assiut", ar:"أسيوط"}, {en:"Sohag", ar:"سوهاج"}, {en:"Qena", ar:"قنا"}, {en:"Luxor", ar:"الأقصر"}, {en:"Aswan", ar:"أسوان"}, {en:"Red Sea", ar:"البحر الأحمر"}, {en:"New Valley", ar:"الوادي الجديد"}, {en:"Matrouh", ar:"مطروح"}];

// --- Export Functionality (Fixed for Arabic) ---
function exportData(type) {
    let csvContent = "";
    let filename = "";
    const BOM = "\uFEFF"; // Byte Order Mark for Excel Arabic Support

    if (type === 'clients') {
        const headers = lang === 'ar' ? "الاسم,الموبايل,المحافظة,الحالة,الملاحظات" : "Name,Phone,Governorate,Status,Notes";
        csvContent = headers + "\n";
        clients.forEach(c => {
            const gName = lang === 'ar' ? (govs.find(g=>g.en===c.gov)?.ar || c.gov) : c.gov;
            csvContent += `"${c.name}","${c.phone}","${gName}","${c.status}","${c.notes || ''}"\n`;
        });
        filename = "Utopia_Clients.csv";
    } else {
        const headers = lang === 'ar' ? "العميل,المهمة,التاريخ,المرحلة" : "Client,Task,Date,Stage";
        csvContent = headers + "\n";
        tasks.forEach(t => {
            csvContent += `"${t.client}","${t.text}","${t.date}","${t.stage}"\n`;
        });
        filename = "Utopia_Tasks.csv";
    }

    const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", filename);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    notify(lang === 'ar' ? 'تم تصدير الملف بنجاح' : 'Exported Successfully', 'success');
}

// --- Login & Basic Logic ---
function checkLogin() {
    if (document.getElementById('userInput').value === 'admin' && document.getElementById('passInput').value === 'admin') {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        sessionStorage.setItem('isLoggedIn', 'true');
        notify('Welcome back!', 'success');
    } else {
        document.getElementById('loginError').style.display = 'block';
        play('error');
    }
}
function logout() { sessionStorage.removeItem('isLoggedIn'); location.reload(); }
if (sessionStorage.getItem('isLoggedIn') === 'true') { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('mainApp').style.display = 'flex'; }

function play(t) { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const o = ctx.createOscillator(); const g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value = t === 'success' ? 880 : 220; o.start(); g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5); o.stop(ctx.currentTime + 0.5); } catch(e){} }
function notify(m, t='info') { const n = document.getElementById('notification'); n.innerText = m; n.style.display = 'block'; n.style.backgroundColor = t === 'success' ? '#28a745' : t === 'error' ? '#dc3545' : '#17a2b8'; play(t); setTimeout(() => n.style.display = 'none', 3000); }
function showTab(id, btn) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); btn.classList.add('active'); }
function fillGovs() { const s = document.getElementById('gov'); s.innerHTML = `<option value="">${lang==='ar'?'اختر المحافظة':'Select Governorate'}</option>`; govs.forEach(g => s.innerHTML += `<option value="${g.en}">${lang==='ar'?g.ar:g.en}</option>`); }

function addOrUpdate() {
    const n = document.getElementById('name').value;
    if(!n) return notify('Name required', 'error');
    const c = { name: n, phone: document.getElementById('phone').value, gov: document.getElementById('gov').value, status: document.getElementById('status').value, notes: document.getElementById('notes').value, agent: document.getElementById('agent').value, followUp: document.getElementById('followUp').value, date: document.getElementById('date').value };
    if(editIdx > -1) { clients[editIdx] = c; editIdx = -1; notify('Updated'); } else { clients.push(c); notify('Saved', 'success'); }
    db.ref('clients').set({...clients});
    document.querySelectorAll('#crmTab input, #crmTab textarea, #crmTab select').forEach(i => { if(i.id !== 'language') i.value = ''; });
    fillGovs();
}

function renderCRM() {
    const b = document.getElementById('tableBody'); b.innerHTML = '';
    const q = document.getElementById('search').value.toLowerCase();
    let hCount = 0;
    clients.forEach((c, i) => {
        if(q && !`${c.name} ${c.phone} ${c.gov}`.toLowerCase().includes(q)) return;
        if(c.status === 'Hold') hCount++;
        const rowCls = `status-${c.status.toLowerCase().replace(/\s/g, '')}`;
        const gName = lang === 'ar' ? (govs.find(g=>g.en===c.gov)?.ar || c.gov) : c.gov;
        b.innerHTML += `<tr class="${rowCls}"><td><b>${c.name}</b></td><td>${c.phone}</td><td>${gName}</td><td>${c.status}</td><td><button onclick="window.open('https://wa.me/${c.phone}')" style="background:#25D366; border:none; border-radius:5px; cursor:pointer;">💬</button> <button onclick="editClient(${i})" style="background:#ffc107; border:none; border-radius:5px; cursor:pointer;">✏️</button> <button onclick="delClient(${i})" style="background:#f44336; border:none; border-radius:5px; color:white;">✕</button></td></tr>`;
    });
    document.getElementById('countAll').innerText = 'Total: ' + clients.length;
    document.getElementById('countHold').innerText = 'Hold: ' + hCount;
}

function editClient(i) { editIdx = i; const c = clients[i]; document.getElementById('name').value = c.name; document.getElementById('phone').value = c.phone; document.getElementById('gov').value = c.gov; document.getElementById('status').value = c.status; document.getElementById('notes').value = c.notes; document.getElementById('agent').value = c.agent; document.getElementById('followUp').value = c.followUp; }
function delClient(i) { if(confirm('Delete?')) { clients.splice(i,1); db.ref('clients').set({...clients}); } }

function addTask() {
    const t = { text: document.getElementById('taskText').value, client: document.getElementById('taskClientSelect').value, date: document.getElementById('taskDate').value, stage: document.getElementById('taskStage').value };
    if(!t.text) return notify('Empty task', 'error');
    tasks.push(t); db.ref('tasks').set({...tasks});
    notify('Task Added', 'success');
}

function renderTasks() {
    const b = document.getElementById('taskBody'); b.innerHTML = '';
    const q = document.getElementById('taskSearch').value.toLowerCase();
    tasks.forEach((t, i) => {
        if(q && !`${t.client} ${t.text}`.toLowerCase().includes(q)) return;
        b.innerHTML += `<tr><td>${t.client}</td><td>${t.text}</td><td>${t.date}</td><td>${t.stage.toUpperCase()}</td><td><button onclick="tasks.splice(${i},1); db.ref('tasks').set({...tasks});" style="color:red; border:none; background:none;">✕</button></td></tr>`;
    });
}

function changeLang(l) { lang = l; document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr'; fillGovs(); renderCRM(); renderTasks(); }

db.ref('clients').on('value', s => { clients = s.val() ? Object.values(s.val()) : []; renderCRM(); const sel = document.getElementById('taskClientSelect'); sel.innerHTML = '<option value="">Client</option>'; clients.forEach(c => sel.innerHTML += `<option value="${c.name}">${c.name}</option>`); });
db.ref('tasks').on('value', s => { tasks = s.val() ? Object.values(s.val()) : []; renderTasks(); });
fillGovs();
</script>
</body>
</html>
