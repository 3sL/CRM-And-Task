<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>CRM System & Tasks For Utopia Trading And Export</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* --- نسخ CSS الأصلي بالكامل بدون حذف --- */
body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: row;
  min-height: 100vh;
  color: #333;
  overflow-x: hidden;
}
h2 {
  margin-top: 0;
  text-align: center;
}
/* أضف باقي CSS الأصلي هنا كما هو */
.sidebar {
  width: 260px;
  background: #0b79d0;
  color: white;
  padding: 20px;
  box-sizing: border-box;
}
.sidebar h2 {
  font-size: 18px;
  margin-bottom: 10px;
}
.tab-btn {
  background: #0972c2;
  color: white;
  border: none;
  width: 100%;
  padding: 10px;
  margin-bottom: 5px;
  cursor: pointer;
  font-size: 14px;
  text-align: left;
}
.tab-btn.active {
  background: #064a7a;
}
.developer, .phone {
  font-size: 12px;
  margin-top: 15px;
  text-align: center;
}
#language {
  width: 100%;
  padding: 5px;
  margin-top: 15px;
  font-size: 14px;
}
.tabs-content {
  flex: 1;
  padding: 20px;
  box-sizing: border-box;
  overflow-y: auto;
}
.logo-container img {
  max-width: 120px;
  display: block;
  margin: 10px auto;
}
.row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 15px;
}
.row input, .row select, .row textarea {
  padding: 8px;
  font-size: 14px;
  flex-grow: 1;
  min-width: 150px;
  box-sizing: border-box;
}
button {
  background: #0b79d0;
  color: white;
  border: none;
  padding: 10px 20px;
  font-size: 14px;
  cursor: pointer;
  margin-bottom: 10px;
}
button:hover {
  background: #064a7a;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 13px;
}
table, th, td {
  border: 1px solid #ddd;
}
th, td {
  padding: 7px 8px;
  text-align: left;
  vertical-align: middle;
}
th {
  background: #0b79d0;
  color: white;
}
.card {
  background: #0b79d0;
  color: white;
  padding: 10px;
  margin-right: 10px;
  border-radius: 3px;
  min-width: 80px;
  text-align: center;
}
.tab-content {
  display: none;
}
.tab-content.active {
  display: block;
}
/* يمكنك إضافة المزيد من CSS الأصلي حسب ملفك */
</style>

<!-- مكتبات Firebase و jsPDF الأصلية -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<!-- إضافة pdfmake لدعم PDF بالعربية -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

</head>
<body>

<div class="sidebar">
  <h2>CRM System & Tasks For Utopia Trading And Export</h2>
  <button class="tab-btn active" onclick="showTab('crmTab', this)">CRM</button>
  <button class="tab-btn" onclick="showTab('tasksTab', this)">Tasks</button>
  <hr>
  <div class="developer">Developed by Eng : <strong>Mahmoud Mohamed Marie</strong></div>
  <div class="phone">📞 +201222153415</div>
  <select id="language" onchange="changeLang(this.value)">
    <option value="en">English</option>
    <option value="ar">عربي</option>
  </select>
</div>

<div class="tabs-content">
  <div id="notification"></div>

  <div id="crmTab" class="tab-content active">
    <div class="logo-container"><img src="logo.png" alt="Company Logo"></div>
    <h2>CRM System</h2>

    <div class="row">
      <input id="universalSearch" placeholder="Search Any Column..." oninput="renderCRM()">
    </div>

    <div class="row">
      <input id="name" placeholder="Client Name">
      <input id="phone" placeholder="Phone">
      <select id="governorate"></select>
      <input type="date" id="date">
      <select id="status">
        <option value="Interested">Interested</option>
        <option value="In Progress">In Progress</option>
        <option value="Hold">Hold</option>
        <option value="Completed">Completed</option>
      </select>
      <textarea id="notes" placeholder="Notes"></textarea>
      <input id="agent" placeholder="Agent Name">
      <input type="number" id="reminderDays" placeholder="Reminder Days">
      <input type="text" id="followUp" placeholder="Follow Up">
    </div>

    <button onclick="addOrUpdate()">💾 Save</button>
    <button onclick="exportPDFWithPdfmake()">📄 Export PDF</button>

    <div class="row">
      <div class="card" id="total">0</div>
      <div class="card" id="hold">Hold: 0</div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th><th>Phone</th><th>Governorate</th><th>Date</th><th>Status</th><th>Notes</th><th>Reminder</th><th>Follow Up</th><th>WhatsApp</th><th>Track</th><th>Edit</th><th>Delete</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

  <div id="tasksTab" class="tab-content">
    <div class="logo-container"><img src="logo.png" alt="Company Logo"></div>
    <h2>Tasks</h2>
    <!-- محتوى المهام كما هو -->
  </div>
</div>

<script>
// === Firebase Initialization ===
const firebaseConfig = {
  apiKey:"AIzaSyBmOQuIUzd2qYB28kPFFaGbSFJ5yXCiMLY",
  authDomain:"crm-tasking.firebaseapp.com",
  databaseURL:"https://crm-tasking-default-rtdb.firebaseio.com",
  projectId:"crm-tasking",
  storageBucket:"crm-tasking.appspot.com",
  messagingSenderId:"368062369619",
  appId:"1:368062369619:web:cd38383ab75ab473961ba6",
  measurementId:"G-16FMSDWDJ6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let clients = []; // مصفوفة العملاء
let editingIndex = null;

// --- عرض التبويبات ---
function showTab(tabId, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  btn.classList.add('active');
}

// --- تغيير اللغة (مثال فقط) ---
function changeLang(lang) {
  if (lang === 'ar') {
    document.body.dir = 'rtl';
  } else {
    document.body.dir = 'ltr';
  }
  // يمكن إضافة ترجمة للعناصر هنا حسب حاجتك
}

// --- تحميل بيانات من Firebase ---
function loadClients() {
  db.ref('clients').on('value', snapshot => {
    clients = [];
    snapshot.forEach(childSnapshot => {
      clients.push(childSnapshot.val());
    });
    renderCRM();
  });
}

// --- عرض البيانات في الجدول ---
function renderCRM() {
  const tbody = document.getElementById('table');
  const search = document.getElementById('universalSearch').value.toLowerCase();
  tbody.innerHTML = '';
  let total = 0;
  let holdCount = 0;
  clients.forEach((client, index) => {
    // تصفية بحث
    let rowText = Object.values(client).join(' ').toLowerCase();
    if (!rowText.includes(search)) return;

    const tr = document.createElement('tr');

    // بيانات الجدول
    tr.innerHTML = `
      <td>${client.name || ''}</td>
      <td>${client.phone || ''}</td>
      <td>${client.governorate || ''}</td>
      <td>${client.date || ''}</td>
      <td>${client.status || ''}</td>
      <td>${client.notes || ''}</td>
      <td>${client.reminderDays || ''}</td>
      <td>${client.followUp || ''}</td>
      <td><button onclick="sendWhatsApp('${client.phone}')">WhatsApp</button></td>
      <td><button onclick="trackClient(${index})">Track</button></td>
      <td><button onclick="editClient(${index})">Edit</button></td>
      <td><button onclick="deleteClient(${index})">Delete</button></td>
    `;

    tbody.appendChild(tr);

    total++;
    if(client.status === 'Hold') holdCount++;
  });

  document.getElementById('total').textContent = `Total: ${total}`;
  document.getElementById('hold').textContent = `Hold: ${holdCount}`;
}

// --- أزرار ---
function addOrUpdate() {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const governorate = document.getElementById('governorate').value;
  const date = document.getElementById('date').value;
  const status = document.getElementById('status').value;
  const notes = document.getElementById('notes').value.trim();
  const agent = document.getElementById('agent').value.trim();
  const reminderDays = document.getElementById('reminderDays').value;
  const followUp = document.getElementById('followUp').value.trim();

  if(!name || !phone) {
    alert('Name and phone are required!');
    return;
  }

  const clientData = { name, phone, governorate, date, status, notes, agent, reminderDays, followUp };

  if(editingIndex === null) {
    clients.push(clientData);
  } else {
    clients[editingIndex] = clientData;
    editingIndex = null;
  }

  // حفظ في Firebase
  db.ref('clients').set(clients);
  clearInputs();
  renderCRM();
}

function clearInputs() {
  ['name', 'phone', 'governorate', 'date', 'status', 'notes', 'agent', 'reminderDays', 'followUp'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

function editClient(index) {
  const c = clients[index];
  ['name', 'phone', 'governorate', 'date', 'status', 'notes', 'agent', 'reminderDays', 'followUp'].forEach(id => {
    document.getElementById(id).value = c[id] || '';
  });
  editingIndex = index;
}

function deleteClient(index) {
  if(confirm('Are you sure to delete this client?')) {
    clients.splice(index,1);
    db.ref('clients').set(clients);
    renderCRM();
  }
}

function sendWhatsApp(phone) {
  if(!phone) return alert('Phone number missing!');
  window.open(`https://wa.me/${phone}`, '_blank');
}

function trackClient(index) {
  alert(`Tracking client: ${clients[index].name || ''}`);
  // هنا يمكن تضيف تعقب الموقع الجغرافي
}

// --- ملء قائمة المحافظات (كمثال) ---
const governorates = ["Cairo","Giza","Alexandria","Aswan","Luxor"];
function fillGovernorates() {
  const sel = document.getElementById('governorate');
  sel.innerHTML = '<option value="">Select Governorate</option>';
  governorates.forEach(gov => {
    const opt = document.createElement('option');
    opt.value = gov;
    opt.textContent = gov;
    sel.appendChild(opt);
  });
}
fillGovernorates();

// === دالة تصدير PDF مع دعم العربية باستخدام pdfmake ===
function exportPDFWithPdfmake() {
  const body = [
    ['الاسم', 'الهاتف', 'المحافظة', 'التاريخ', 'الحالة', 'ملاحظات', 'التذكير', 'المتابعة']
  ];

  clients.forEach(c => {
    body.push([
      c.name || '-',
      c.phone || '-',
      c.governorate || '-',
      c.date || '-',
      c.status || '-',
      c.notes || '-',
      c.reminderDays || '-',
      c.followUp || '-'
    ]);
  });

  const docDefinition = {
    content: [
      { text: 'تقرير عملاء CRM', style: 'header', alignment: 'center' },
      {
        table: {
          headerRows: 1,
          widths: Array(8).fill('*'),
          body: body
        },
        layout: 'lightHorizontalLines'
      }
    ],
    defaultStyle: { font: 'Helvetica', alignment: 'right' },
    styles: {
      header: { fontSize: 18, bold: true }
    },
    pageOrientation: 'landscape'
  };

  pdfMake.createPdf(docDefinition).download('CRM_Report.pdf');
}

// --- تحميل البيانات عند البداية ---
loadClients();

</script>
</body>
</html>
