<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>CRM System & Tasks For Utopia Trading And Export</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
/* --- التنسيقات الأصلية كاملة --- */
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:#f5f6fa; margin:0; padding:0; display:flex; flex-direction:row; min-height:100vh; color:#333; overflow-x:hidden; }
.sidebar { width:250px; background:#1e1e2f; color:#fff; display:flex; flex-direction:column; padding:20px; box-sizing:border-box; transition: all 0.3s ease; border-right: 2px solid #ffcc00; }
.sidebar h2 { font-size:1.4em; margin-bottom:20px; color:#ffcc00; text-align:center; }
.sidebar button { background:#2e2e4d; color:#fff; border:none; padding:12px; margin:5px 0; border-radius:12px; cursor:pointer; text-align:right; font-weight:bold; transition: 0.2s; }
.sidebar button:hover { background:#3f3f6b; }
.sidebar button.active { background:#ffcc00; color:#1e1e2f; }
.sidebar select { padding:10px; border-radius:8px; border:none; margin-top:10px; background: #fff; }
.tabs-content { flex:1; padding:25px; overflow:auto; width:100%; box-sizing:border-box; }
.tab-content { animation:fadeIn 0.3s ease; display:none; }
.tab-content.active { display:block; }
input, select, textarea, button { padding:12px; margin:5px 0; width:100%; box-sizing:border-box; border-radius:8px; border:1px solid #ccc; outline:none; }
textarea { resize:none; height:80px; }
button { background:#007bff; color:#fff; border:none; cursor:pointer; font-weight:bold; transition:0.2s; }
.card { background:#fff; padding:15px; text-align:center; border-radius:12px; margin:5px; flex:1; box-shadow:0 4px 6px rgba(0,0,0,0.1); font-weight:bold; }
.row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
table { width:100%; border-collapse:collapse; margin-top:15px; background:#fff; border-radius:12px; overflow-x:auto; display:block; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
th, td { border-bottom:1px solid #eee; padding:12px; text-align:center; min-width:130px; }
th { background:#1e1e2f; color:#ffcc00; font-weight:bold; }

/* --- نظام الألوان والـ Hold --- */
.row-hold { background-color: #fff3cd !important; border-left: 5px solid #ffcc00; }
.status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.85em; color: white; font-weight: bold; }
.badge-interested { background: #17a2b8; }
.badge-inprogress { background: #007bff; }
.badge-hold { background: #ffcc00; color: #1e1e2f; }
.badge-completed { background: #28a745; }

/* ألوان مراحل المهام */
.task-stage { padding:6px 12px; color:#fff; border-radius:12px; font-weight:bold; font-size:0.85em; }
.stage-quote { background:#ff7f50; } 
.stage-follow { background:#1e90ff; }
.stage-order { background:#28a745; }
.stage-bank { background:#6f42c1; }

/* --- التنبيهات (Toasts) --- */
#toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
.toast { background: #1e1e2f; color: #fff; padding: 15px 25px; margin-bottom: 10px; border-radius: 12px; border-left: 6px solid #ffcc00; box-shadow: 0 10px 20px rgba(0,0,0,0.2); animation: slideIn 0.4s ease forwards; font-weight: bold; }
.toast.success { border-left-color: #28a745; }
.toast.error { border-left-color: #dc3545; }

.logo-container { text-align:center; margin-bottom:20px; }
.logo-container img { max-width: 180px; height: auto; border-radius: 12px; }

@keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
@media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; flex-direction: row; overflow-x: auto; } .sidebar h2 { display:none; } }
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="toast-container"></div>

<div class="sidebar">
  <h2 data-lang-key="title">Utopia Trading</h2>
  <button class="tab-btn active" onclick="showTab('crmTab', this)" data-lang-key="crm">CRM</button>
  <button class="tab-btn" onclick="showTab('tasksTab', this)" data-lang-key="tasks">Tasks</button>
  <hr>
  <div style="font-size:0.8em; text-align:center;">Developed by Eng:<br><strong>Mahmoud Mohamed Marie</strong></div>
  <div style="font-size:0.8em; text-align:center;">📞 +201222153415</div>
  <select id="language" onchange="changeLang(this.value)">
    <option value="en">English</option>
    <option value="ar">عربي</option>
  </select>
</div>

<div class="tabs-content">
  <div id="crmTab" class="tab-content active">
    <div class="logo-container"><img src="logo.png" alt="Company Logo"></div>
    <h2 data-lang-key="crm_title">CRM System</h2>
    <div class="row">
      <input id="universalSearch" placeholder="Search Any Column..." oninput="renderCRM()">
    </div>
    <div class="row">
      <input id="name" placeholder="Client Name">
      <input id="phone" placeholder="Phone">
      <input type="date" id="date">
      <select id="status">
        <option value="Interested">Interested</option>
        <option value="In Progress">In Progress</option>
        <option value="Hold">Hold</option>
        <option value="Completed">Completed</option>
      </select>
      <textarea id="notes" placeholder="Notes"></textarea>
      <input id="agent" placeholder="Agent Name">
      <input type="number" id="reminderDays" placeholder="Reminder Days">
      <input type="text" id="followUp" placeholder="Follow Up Status">
    </div>
    <button onclick="addOrUpdate()" id="mainSaveBtn" data-lang-key="save">💾 Save Data</button>
    <div class="row">
      <div class="card" id="totalCount">Total: 0</div>
      <div class="card" id="holdCount" style="color:#ffcc00">Hold: 0</div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Name</th><th>Phone</th><th>Date</th><th>Status</th><th>Notes</th><th>Agent</th><th>Reminder</th><th>Follow Up</th><th>WhatsApp</th><th>Edit</th><th>Delete</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div id="tasksTab" class="tab-content">
    <div class="logo-container"><img src="logo.png" alt="Company Logo"></div>
    <h2 data-lang-key="tasks_title">Tasks</h2>
    <div class="row">
      <input id="taskInput" placeholder="Task Details">
      <select id="taskClient"><option value="">Select Client</option></select>
      <input type="date" id="taskDate">
      <select id="taskStage">
        <option value="quote">Quote</option>
        <option value="follow">Follow Up</option>
        <option value="order">Order</option>
        <option value="bank">Bank</option>
      </select>
      <button onclick="addTask()" data-lang-key="add_task">➕ Add Task</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Client</th><th>Date</th><th>Stage</th><th>Task</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="tasksTableBody"></tbody>
    </table>
  </div>
</div>

<script>
// Firebase Initialization
const firebaseConfig = { apiKey: "AIzaSyBmOQuIUzd2qYB28kPFFaGbSFJ5yXCiMLY", authDomain: "crm-tasking.firebaseapp.com", databaseURL: "https://crm-tasking-default-rtdb.firebaseio.com", projectId: "crm-tasking", storageBucket: "crm-tasking.appspot.com", messagingSenderId: "368062369619", appId: "1:368062369619:web:cd38383ab75ab473961ba6" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let clients = {}, tasks = {}, editId = null, lang = 'en';

// --- Toast Notifications ---
function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
}

// Data Sync
db.ref('clients').on('value', snap => { clients = snap.val() || {}; renderCRM(); updateDropdown(); });
db.ref('tasks').on('value', snap => { tasks = snap.val() || {}; renderTasks(); });

function showTab(id, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// CRM Logic
function addOrUpdate(){
  const name = document.getElementById('name').value;
  if(!name) { showToast("Name is required!", "error"); return; }

  const data = {
    name,
    phone: document.getElementById('phone').value,
    date: document.getElementById('date').value,
    status: document.getElementById('status').value,
    notes: document.getElementById('notes').value,
    agent: document.getElementById('agent').value,
    reminderDays: document.getElementById('reminderDays').value,
    followUp: document.getElementById('followUp').value
  };

  if(editId){
    db.ref('clients/'+editId).update(data).then(() => showToast("Updated: " + name));
    editId = null;
    document.getElementById('mainSaveBtn').innerText = "💾 Save Data";
  } else {
    db.ref('clients').push(data).then(() => showToast("Added: " + name));
  }
  clearInputs();
}

function renderCRM(){
  const tbody = document.getElementById('tableBody');
  const search = document.getElementById('universalSearch').value.toLowerCase();
  tbody.innerHTML = '';
  let total = 0, hold = 0;

  for(let id in clients){
    const c = clients[id];
    if(search && !c.name.toLowerCase().includes(search)) continue;
    
    total++;
    const isHold = c.status === "Hold";
    if(isHold) hold++;

    const badgeClass = `badge-${c.status.toLowerCase().replace(" ", "")}`;
    const rowClass = isHold ? 'row-hold' : '';

    tbody.innerHTML += `<tr class="${rowClass}">
      <td>${c.name}</td><td>${c.phone}</td><td>${c.date}</td>
      <td><span class="status-badge ${badgeClass}">${c.status}</span></td>
      <td>${c.notes}</td><td>${c.agent}</td><td>${c.reminderDays}</td><td>${c.followUp}</td>
      <td><button onclick="window.open('https://wa.me/${c.phone.replace(/\D/g,'')}')" style="background:#25D366">📱</button></td>
      <td><button onclick="editClient('${id}')" style="background:#28a745">✏️</button></td>
      <td><button onclick="deleteClient('${id}')" style="background:#dc3545">🗑️</button></td>
    </tr>`;
  }
  document.getElementById('totalCount').innerText = "Total: " + total;
  document.getElementById('holdCount').innerText = "Hold: " + hold;
}

function editClient(id){
  const c = clients[id];
  editId = id;
  document.getElementById('name').value = c.name;
  document.getElementById('phone').value = c.phone;
  document.getElementById('date').value = c.date;
  document.getElementById('status').value = c.status;
  document.getElementById('notes').value = c.notes;
  document.getElementById('agent').value = c.agent;
  document.getElementById('reminderDays').value = c.reminderDays;
  document.getElementById('followUp').value = c.followUp;
  document.getElementById('mainSaveBtn').innerText = "Update Now";
  showToast("Editing mode: " + c.name);
}

function deleteClient(id){
  if(confirm("Delete this client?")) db.ref('clients/'+id).remove().then(() => showToast("Client Deleted", "error"));
}

// Tasks Logic
function addTask(){
  const t = {
    text: document.getElementById('taskInput').value,
    client: document.getElementById('taskClient').value,
    date: document.getElementById('taskDate').value,
    stage: document.getElementById('taskStage').value
  };
  if(!t.text) return showToast("Enter task info", "error");
  db.ref('tasks').push(t).then(() => showToast("Task Added"));
  document.getElementById('taskInput').value = '';
}

function renderTasks(){
  const tbody = document.getElementById('tasksTableBody');
  tbody.innerHTML = '';
  for(let id in tasks){
    const t = tasks[id];
    tbody.innerHTML += `<tr>
      <td>${t.client}</td><td>${t.date}</td>
      <td><span class="task-stage stage-${t.stage}">${t.stage.toUpperCase()}</span></td>
      <td>${t.text}</td>
      <td><button onclick="deleteTask('${id}')" style="background:red">🗑️</button></td>
    </tr>`;
  }
}

function deleteTask(id){ db.ref('tasks/'+id).remove().then(() => showToast("Task Removed", "error")); }

function updateDropdown(){
  const sel = document.getElementById('taskClient');
  sel.innerHTML = '<option value="">Select Client</option>';
  for(let id in clients) sel.innerHTML += `<option value="${clients[id].name}">${clients[id].name}</option>`;
}

function clearInputs(){
  ['name','phone','date','notes','agent','reminderDays','followUp'].forEach(i=>document.getElementById(i).value='');
}

function changeLang(l){
  lang = l;
  document.body.dir = (l === 'ar' ? 'rtl' : 'ltr');
  showToast(l === 'ar' ? "تم تغيير اللغة" : "Language changed");
}
</script>
</body>
</html>
