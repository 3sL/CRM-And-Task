<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>CRM System & Tasks For Utopia Trading And Export</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
/* --- التنسيقات الأساسية كاملة --- */
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:#f5f6fa; margin:0; padding:0; display:flex; flex-direction:row; min-height:100vh; color:#333; overflow-x:hidden; }
.sidebar { width:250px; background:#1e1e2f; color:#fff; display:flex; flex-direction:column; padding:20px; box-sizing:border-box; transition: all 0.3s ease; border-right: 3px solid #ffcc00; position: sticky; top:0; height: 100vh; }
.sidebar h2 { font-size:1.5em; margin-bottom:20px; color:#ffcc00; text-align:center; }
.sidebar button { background:#2e2e4d; color:#fff; border:none; padding:12px; margin:5px 0; border-radius:12px; cursor:pointer; text-align:right; font-weight:bold; transition: 0.2s; }
.sidebar button.active { background:#ffcc00; color:#1e1e2f; }
.sidebar .developer { font-size: 0.8em; margin-top: auto; padding: 10px; border-top: 1px solid #3f3f6b; text-align: center; }

.tabs-content { flex:1; padding:25px; overflow:auto; box-sizing:border-box; }
.tab-content { animation:fadeIn 0.3s ease; display:none; }
.tab-content.active { display:block; }

/* ضبط المدخلات لظهورها بوضوح في العربي */
input, select, textarea { padding:12px; margin:5px 0; width:100%; box-sizing:border-box; border-radius:8px; border:1px solid #ccc; outline:none; font-size: 14px; color: #000 !important; background: #fff !important; }
textarea { resize:none; height:80px; }
button { padding:12px; border-radius:8px; border:none; cursor:pointer; font-weight:bold; transition:0.2s; color:#fff; }

.row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
.card { background:#fff; padding:15px; text-align:center; border-radius:12px; margin:5px; flex:1; box-shadow:0 4px 6px rgba(0,0,0,0.1); font-weight:bold; border-bottom: 4px solid #ffcc00; }

/* الجداول والألوان */
table { width:100%; border-collapse:collapse; margin-top:15px; background:#fff; border-radius:12px; overflow-x:auto; display:block; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
th, td { border-bottom:1px solid #eee; padding:12px; text-align:center; min-width: 130px; }
th { background:#1e1e2f; color:#ffcc00; font-weight:bold; }
.row-hold { background-color: #fff4e5 !important; border-left: 6px solid #ffa500; }

/* ألوان مراحل المهام */
.task-stage { padding:6px 12px; color:#fff; border-radius:12px; font-weight:bold; font-size:0.85em; }
.stage-quote { background:#ff7f50; } .stage-follow { background:#1e90ff; } .stage-order { background:#28a745; } .stage-bank { background:#6f42c1; }

/* التنبيهات Toasts */
#toast-container { position: fixed; top:20px; right:20px; z-index:10000; }
.toast { background:#1e1e2f; color:#fff; padding:15px 25px; border-radius:12px; margin-bottom:10px; border-left: 5px solid #ffcc00; box-shadow:0 10px 20px rgba(0,0,0,0.2); animation: slideIn 0.3s ease; font-weight: bold; }
.toast.error { border-left-color: #dc3545; }
.toast.success { border-left-color: #28a745; }

.logo-container { text-align:center; margin-bottom:20px; }
.logo-container img { max-width: 180px; height: auto; border-radius: 15px; }

@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
@media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; position: static; } .sidebar h2, .sidebar .developer { display:none; } }
</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="toast-container"></div>

<div class="sidebar">
  <h2 data-lang-key="title">Utopia CRM</h2>
  <button class="tab-btn active" onclick="showTab('crmTab', this)" data-lang-key="crm">CRM System</button>
  <button class="tab-btn" onclick="showTab('tasksTab', this)" data-lang-key="tasks">Tasks Tracker</button>
  <hr>
  <div class="developer" data-lang-key="dev_name">Dev: <strong>Mahmoud Mohamed Marie</strong></div>
  <div style="text-align:center; font-size: 0.8em; color: #ffcc00;">📞 +201222153415</div>
  <select id="language" onchange="changeLang(this.value)" style="margin-top:10px; cursor:pointer;">
    <option value="en">English</option>
    <option value="ar">عربي</option>
  </select>
</div>

<div class="tabs-content">
  <div id="crmTab" class="tab-content active">
    <div class="logo-container"><img src="logo.png" alt="Utopia Logo"></div>
    <h2 data-lang-key="crm_title">Client Management System</h2>
    <input id="universalSearch" placeholder="🔍 Search by name, phone, or city..." oninput="renderCRM()">
    
    <div class="card" style="text-align: left;">
      <div class="row">
        <input id="name" placeholder="Client Name" data-lang-placeholder-ar="اسم العميل">
        <input id="phone" placeholder="Phone" data-lang-placeholder-ar="رقم الهاتف">
        <input type="date" id="date">
        <select id="status">
          <option value="Interested" data-lang-key="opt_interested">Interested</option>
          <option value="In Progress" data-lang-key="opt_progress">In Progress</option>
          <option value="Hold" data-lang-key="opt_hold">Hold</option>
          <option value="Completed" data-lang-key="opt_completed">Completed</option>
        </select>
        
        <select id="city">
          <option value="" data-lang-key="sel_city">Select City - اختر المحافظة</option>
          <option value="Cairo">القاهرة - Cairo</option>
          <option value="Giza">الجيزة - Giza</option>
          <option value="Alexandria">الإسكندرية - Alexandria</option>
          <option value="Dakahlia">الدقهلية - Dakahlia</option>
          <option value="Sharkia">الشرقية - Sharkia</option>
          <option value="Monufia">المنوفية - Monufia</option>
          <option value="Qalyubia">القليوبية - Qalyubia</option>
          <option value="Gharbia">الغربية - Gharbia</option>
          <option value="Beheira">البحيرة - Beheira</option>
          <option value="Kafr El Sheikh">كفر الشيخ - Kafr El Sheikh</option>
          <option value="Damietta">دمياط - Damietta</option>
          <option value="Port Said">بورسعيد - Port Said</option>
          <option value="Ismailia">الإسماعيلية - Ismailia</option>
          <option value="Suez">السويس - Suez</option>
          <option value="North Sinai">شمال سيناء - North Sinai</option>
          <option value="South Sinai">جنوب سيناء - South Sinai</option>
          <option value="Beni Suef">بني سويف - Beni Suef</option>
          <option value="Fayoum">الفيوم - Fayoum</option>
          <option value="Minya">المنيا - Minya</option>
          <option value="Assiut">أسيوط - Assiut</option>
          <option value="Sohag">سوهاج - Sohag</option>
          <option value="Qena">قنا - Qena</option>
          <option value="Luxor">الأقصر - Luxor</option>
          <option value="Aswan">أسوان - Aswan</option>
          <option value="Red Sea">البحر الأحمر - Red Sea</option>
          <option value="New Valley">الوادي الجديد - New Valley</option>
          <option value="Matrouh">مطروح - Matrouh</option>
        </select>

        <textarea id="notes" placeholder="Notes" data-lang-placeholder-ar="ملاحظات"></textarea>
        <input id="agent" placeholder="Agent Name" data-lang-placeholder-ar="اسم المندوب">
        <input type="number" id="reminderDays" placeholder="Reminder Days" data-lang-placeholder-ar="أيام التذكير">
        <input type="text" id="followUp" placeholder="Follow Up Status" data-lang-placeholder-ar="حالة المتابعة">
      </div>
      <button onclick="addOrUpdate()" id="mainSaveBtn" style="background: #007bff;" data-lang-key="save_btn">💾 Save Client Data</button>
    </div>

    <div class="row">
      <div class="card" id="totalCard">Total: 0</div>
      <div class="card" id="holdCard" style="color: #ffa500;">Hold: 0</div>
    </div>
    
    <table>
      <thead>
        <tr>
          <th data-lang-key="th_name">Name</th><th data-lang-key="th_phone">Phone</th><th data-lang-key="th_city">City</th>
          <th data-lang-key="th_status">Status</th><th data-lang-key="th_notes">Notes</th><th data-lang-key="th_agent">Agent</th>
          <th data-lang-key="th_reminder">Reminder</th><th data-lang-key="th_whatsapp">WhatsApp</th><th data-lang-key="th_edit">Edit</th><th data-lang-key="th_delete">Delete</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div id="tasksTab" class="tab-content">
    <div class="logo-container"><img src="logo.png" alt="Utopia Logo"></div>
    <h2 data-lang-key="tasks_title">Tasks Management</h2>
    <div class="card">
      <div class="row">
        <input id="taskInput" placeholder="Task Details" data-lang-placeholder-ar="تفاصيل المهمة">
        <select id="taskClient"><option value="">Select Client</option></select>
        <input type="date" id="taskDate">
        <select id="taskStage">
          <option value="quote">Quote Stage</option>
          <option value="follow">Follow Up Stage</option>
          <option value="order">Order Stage</option>
          <option value="bank">Bank Stage</option>
        </select>
        <button onclick="addTask()" style="background: #28a745;" data-lang-key="add_task_btn">➕ Add New Task</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th data-lang-key="th_client">Client</th><th data-lang-key="th_date">Date</th><th data-lang-key="th_stage">Stage</th>
          <th data-lang-key="th_task">Task</th><th data-lang-key="th_delete">Delete</th>
        </tr>
      </thead>
      <tbody id="tasksTableBody"></tbody>
    </table>
  </div>
</div>

<script>
// --- Firebase Config ---
const firebaseConfig = { apiKey: "AIzaSyBmOQuIUzd2qYB28kPFFaGbSFJ5yXCiMLY", authDomain: "crm-tasking.firebaseapp.com", databaseURL: "https://crm-tasking-default-rtdb.firebaseio.com", projectId: "crm-tasking", storageBucket: "crm-tasking.appspot.com", messagingSenderId: "368062369619", appId: "1:368062369619:web:cd38383ab75ab473961ba6" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- القاموس الكامل للغات ---
const langData = {
  en: { title:"Utopia CRM", crm:"CRM System", tasks:"Tasks Tracker", dev_name:"Dev: Mahmoud Mohamed Marie", crm_title:"Client Management", tasks_title:"Tasks Management", save_btn:"💾 Save Client Data", add_task_btn:"➕ Add New Task", sel_city:"Select City", th_name:"Name", th_phone:"Phone", th_city:"City", th_status:"Status", th_notes:"Notes", th_agent:"Agent", th_reminder:"Remind", th_whatsapp:"WhatsApp", th_edit:"Edit", th_delete:"Delete", th_client:"Client", th_date:"Date", th_stage:"Stage", th_task:"Task", opt_interested:"Interested", opt_progress:"In Progress", opt_hold:"Hold", opt_completed:"Completed" },
  ar: { title:"يوتوبيا CRM", crm:"نظام العملاء", tasks:"جدول المهام", dev_name:"تطوير: محمود محمد ماري", crm_title:"إدارة بيانات العملاء", tasks_title:"إدارة المهام المطلوبة", save_btn:"💾 حفظ بيانات العميل", add_task_btn:"➕ إضافة مهمة جديدة", sel_city:"اختر المحافظة", th_name:"الاسم", th_phone:"الهاتف", th_city:"المحافظة", th_status:"الحالة", th_notes:"ملاحظات", th_agent:"المندوب", th_reminder:"تذكير", th_whatsapp:"واتساب", th_edit:"تعديل", th_delete:"حذف", th_client:"العميل", th_date:"التاريخ", th_stage:"المرحلة", th_task:"المهمة", opt_interested:"مهتم", opt_progress:"قيد التنفيذ", opt_hold:"انتظار", opt_completed:"مكتمل" }
};

let clients = {}, tasks = {}, editId = null, currentLang = 'en';

function showToast(msg, type='success') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerText = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity='0'; setTimeout(()=>toast.remove(), 400); }, 3000);
}

// المزامنة مع Firebase
db.ref('clients').on('value', s => { clients = s.val() || {}; renderCRM(); updateDropdown(); });
db.ref('tasks').on('value', s => { tasks = s.val() || {}; renderTasks(); });

function showTab(id, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function addOrUpdate(){
  const name = document.getElementById('name').value;
  if(!name) return showToast("Name is required!", "error");

  const data = {
    name, phone: document.getElementById('phone').value,
    date: document.getElementById('date').value,
    status: document.getElementById('status').value,
    city: document.getElementById('city').value,
    notes: document.getElementById('notes').value,
    agent: document.getElementById('agent').value,
    reminderDays: document.getElementById('reminderDays').value,
    followUp: document.getElementById('followUp').value
  };

  if(editId){
    db.ref('clients/'+editId).set(data).then(()=>showToast("Data Updated Successfully", "success"));
    editId = null;
    document.getElementById('mainSaveBtn').innerText = currentLang==='ar' ? "💾 حفظ بيانات العميل" : "💾 Save Client Data";
  } else {
    db.ref('clients').push(data).then(()=>showToast("New Client Added", "success"));
  }
  clearFields();
}

function renderCRM(){
  const tbody = document.getElementById('tableBody');
  const search = document.getElementById('universalSearch').value.toLowerCase();
  tbody.innerHTML = '';
  let total=0, hold=0;

  for(let id in clients){
    const c = clients[id];
    if(search && !c.name.toLowerCase().includes(search) && !c.city.toLowerCase().includes(search) && !c.phone.includes(search)) continue;

    total++; if(c.status === "Hold") hold++;

    tbody.innerHTML += `<tr class="${c.status === 'Hold' ? 'row-hold' : ''}">
      <td style="font-weight:bold">${c.name}</td><td>${c.phone}</td><td>${c.city}</td>
      <td>${c.status}</td><td>${c.notes}</td><td>${c.agent}</td><td>${c.reminderDays}</td>
      <td><button onclick="window.open('https://wa.me/${c.phone}')" style="background:#25D366; width:auto; padding:5px 10px;">📱 WA</button></td>
      <td><button onclick="editClient('${id}')" style="background:#28a745; width:auto; padding:5px 10px;">✏️</button></td>
      <td><button onclick="deleteClient('${id}')" style="background:#dc3545; width:auto; padding:5px 10px;">🗑️</button></td>
    </tr>`;
  }
  document.getElementById('totalCard').innerText = (currentLang==='ar'?'الإجمالي: ':'Total: ') + total;
  document.getElementById('holdCard').innerText = (currentLang==='ar'?'الانتظار: ':'Hold: ') + hold;
}

function editClient(id){
  const c = clients[id]; editId = id;
  ['name','phone','date','status','city','notes','agent','reminderDays','followUp'].forEach(k => {
    document.getElementById(k).value = c[k] || '';
  });
  document.getElementById('mainSaveBtn').innerText = currentLang==='ar' ? "تعديل الآن" : "Update Now";
  showToast("Ready to edit: " + c.name);
}

function deleteClient(id){
  if(confirm("Are you sure you want to delete this client?")) {
    db.ref('clients/'+id).remove().then(()=>showToast("Client Deleted", "error"));
  }
}

// Tasks Logic
function addTask(){
  const t = {
    text: document.getElementById('taskInput').value,
    client: document.getElementById('taskClient').value,
    date: document.getElementById('taskDate').value,
    stage: document.getElementById('taskStage').value
  };
  if(!t.text || !t.client) return showToast("Details required", "error");
  db.ref('tasks').push(t).then(()=>showToast("Task Assigned", "success"));
  document.getElementById('taskInput').value='';
}

function renderTasks(){
  const tbody = document.getElementById('tasksTableBody'); tbody.innerHTML = '';
  for(let id in tasks){
    const t = tasks[id];
    tbody.innerHTML += `<tr>
      <td style="font-weight:bold">${t.client}</td><td>${t.date}</td>
      <td><span class="task-stage stage-${t.stage}">${t.stage.toUpperCase()}</span></td>
      <td>${t.text}</td>
      <td><button onclick="deleteTask('${id}')" style="background:#dc3545; width:auto; padding:5px 10px;">🗑️</button></td>
    </tr>`;
  }
}

function deleteTask(id){ db.ref('tasks/'+id).remove().then(()=>showToast("Task Removed", "error")); }

function updateDropdown(){
  const sel = document.getElementById('taskClient');
  sel.innerHTML = '<option value="">Select Client</option>';
  for(let id in clients) sel.innerHTML += `<option value="${clients[id].name}">${clients[id].name}</option>`;
}

function clearFields(){
  ['name','phone','date','status','city','notes','agent','reminderDays','followUp'].forEach(i=>document.getElementById(i).value='');
}

function changeLang(l){
  currentLang = l; document.body.dir = l==='ar'?'rtl':'ltr';
  document.querySelectorAll('[data-lang-key]').forEach(el => {
    el.innerText = langData[l][el.getAttribute('data-lang-key')];
  });
  // Update Placeholders
  document.querySelectorAll('[data-lang-placeholder-ar]').forEach(el => {
    el.placeholder = (l === 'ar') ? el.getAttribute('data-lang-placeholder-ar') : el.placeholder;
  });
  renderCRM(); renderTasks();
}
</script>
</body>
</html>
