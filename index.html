<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>CRM System - Utopia Trading</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    /* التنسيقات الأساسية */
    body { font-family: 'Segoe UI', sans-serif; background:#f5f6fa; margin:0; display:flex; min-height:100vh; }
    .sidebar { width:250px; background:#1e1e2f; color:#fff; padding:20px; display:flex; flex-direction:column; }
    .sidebar button { background:#2e2e4d; color:#fff; border:none; padding:12px; margin:5px 0; border-radius:8px; cursor:pointer; text-align:left; }
    .sidebar button.active { background:#ffcc00; color:#1e1e2f; font-weight:bold; }
    .tabs-content { flex:1; padding:25px; overflow-y:auto; }
    .tab-content { display:none; animation: fadeIn 0.3s; }
    .tab-content.active { display:block; }
    .row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; }
    input, select, textarea, button { padding:10px; border-radius:5px; border:1px solid #ccc; flex:1; min-width:150px; }
    button.save-btn { background:#28a745; color:white; font-weight:bold; cursor:pointer; flex:none; width:100%; }
    table { width:100%; border-collapse:collapse; background:white; border-radius:10px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    th, td { padding:12px; border-bottom:1px solid #eee; text-align:center; }
    th { background:#1e1e2f; color:#ffcc00; }
    .btn-edit { background:#007bff; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; }
    .btn-del { background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; }
    @keyframes fadeIn { from {opacity:0} to {opacity:1} }
    @media (max-width:768px) { body { flex-direction:column; } .sidebar { width:100%; flex-direction:row; overflow-x:auto; } }
</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="sidebar">
    <h2>Utopia CRM</h2>
    <button class="tab-btn active" onclick="showTab('crmTab', this)">CRM</button>
    <button class="tab-btn" onclick="showTab('tasksTab', this)">Tasks</button>
    <div style="margin-top:auto; font-size:12px; opacity:0.6;">Dev by: Eng. Mahmoud Marie</div>
</div>

<div class="tabs-content">
    <div id="crmTab" class="tab-content active">
        <h2>Client Management</h2>
        <div class="row">
            <input type="text" id="name" placeholder="Client Name">
            <input type="text" id="phone" placeholder="Phone">
            <input type="date" id="date">
            <select id="status">
                <option value="Interested">Interested</option>
                <option value="In Progress">In Progress</option>
                <option value="Completed">Completed</option>
            </select>
            <textarea id="notes" placeholder="Notes"></textarea>
        </div>
        <button class="save-btn" id="saveCrmBtn" onclick="saveCRM()">💾 Save Client</button>
        
        <div class="row" style="margin-top:20px;">
            <input type="text" id="searchCrm" placeholder="Search by name..." oninput="renderCRM()">
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Name</th><th>Phone</th><th>Status</th><th>Notes</th><th>Actions</th>
                </tr>
            </thead>
            <tbody id="crmTableBody"></tbody>
        </table>
    </div>

    <div id="tasksTab" class="tab-content">
        <h2>Task Tracker</h2>
        <div class="row">
            <input type="text" id="taskText" placeholder="Task details...">
            <select id="taskClientSelect"><option value="">Select Client</option></select>
            <input type="date" id="taskDate">
            <button class="save-btn" onclick="saveTask()">➕ Add Task</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Client</th><th>Date</th><th>Task</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="taskTableBody"></tbody>
        </table>
    </div>
</div>

<script>
// 1. Firebase Config (بياناتك اللي بعتها)
const firebaseConfig = {
    apiKey: "AIzaSyBmOQuIUzd2qYB28kPFFaGbSFJ5yXCiMLY",
    authDomain: "crm-tasking.firebaseapp.com",
    databaseURL: "https://crm-tasking-default-rtdb.firebaseio.com",
    projectId: "crm-tasking",
    storageBucket: "crm-tasking.appspot.com",
    messagingSenderId: "368062369619",
    appId: "1:368062369619:web:cd38383ab75ab473961ba6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let editId = null; // للمتابعة لو بنعدل عميل موجود

// 2. جلب البيانات (Real-time)
// الميزة هنا إن أي تغيير من أي جهاز بيسمع عند الكل فوراً
function fetchData() {
    // جلب العملاء
    db.ref('clients').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        renderCRM(data);
        updateDropdown(data);
    });

    // جلب المهام
    db.ref('tasks').on('value', (snapshot) => {
        renderTasks(snapshot.val() || {});
    });
}

// 3. حفظ بيانات CRM
function saveCRM() {
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    if(!name) return alert("Please enter name");

    const clientData = {
        name: name,
        phone: phone,
        date: document.getElementById('date').value,
        status: document.getElementById('status').value,
        notes: document.getElementById('notes').value
    };

    if(editId) {
        // تحديث عميل موجود
        db.ref('clients/' + editId).update(clientData);
        editId = null;
        document.getElementById('saveCrmBtn').innerText = "💾 Save Client";
    } else {
        // إضافة عميل جديد
        db.ref('clients').push(clientData);
    }
    clearInputs(['name', 'phone', 'date', 'notes']);
}

// 4. عرض جدول الـ CRM
function renderCRM(data) {
    const tbody = document.getElementById('crmTableBody');
    const search = document.getElementById('searchCrm').value.toLowerCase();
    tbody.innerHTML = '';

    for (let id in data) {
        if(search && !data[id].name.toLowerCase().includes(search)) continue;
        
        const tr = `<tr>
            <td>${data[id].name}</td>
            <td>${data[id].phone}</td>
            <td>${data[id].status}</td>
            <td>${data[id].notes}</td>
            <td>
                <button class="btn-edit" onclick="startEdit('${id}', ${JSON.stringify(data[id]).replace(/"/g, '&quot;')})">✏️</button>
                <button class="btn-del" onclick="deleteItem('clients/${id}')">🗑️</button>
            </td>
        </tr>`;
        tbody.innerHTML += tr;
    }
}

// 5. حفظ المهام
function saveTask() {
    const task = {
        text: document.getElementById('taskText').value,
        client: document.getElementById('taskClientSelect').value,
        date: document.getElementById('taskDate').value
    };
    if(!task.text) return;
    db.ref('tasks').push(task);
    document.getElementById('taskText').value = '';
}

function renderTasks(data) {
    const tbody = document.getElementById('taskTableBody');
    tbody.innerHTML = '';
    for (let id in data) {
        tbody.innerHTML += `<tr>
            <td>${data[id].client}</td>
            <td>${data[id].date}</td>
            <td>${data[id].text}</td>
            <td><button class="btn-del" onclick="deleteItem('tasks/${id}')">🗑️</button></td>
        </tr>`;
    }
}

// وظائف مساعدة
function deleteItem(path) {
    if(confirm("Are you sure?")) db.ref(path).remove();
}

function startEdit(id, val) {
    editId = id;
    document.getElementById('name').value = val.name;
    document.getElementById('phone').value = val.phone;
    document.getElementById('status').value = val.status;
    document.getElementById('notes').value = val.notes;
    document.getElementById('saveCrmBtn').innerText = "Update Client";
}

function updateDropdown(clients) {
    const select = document.getElementById('taskClientSelect');
    select.innerHTML = '<option value="">Select Client</option>';
    for(let id in clients) {
        select.innerHTML += `<option value="${clients[id].name}">${clients[id].name}</option>`;
    }
}

function clearInputs(ids) {
    ids.forEach(id => document.getElementById(id).value = '');
}

function showTab(tabId, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
}

// تشغيل جلب البيانات عند فتح الصفحة
window.onload = fetchData;

</script>
</body>
</html>
