<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM & Tasks System</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; }
header { background:#007bff; color:white; padding:1em; text-align:center; }
.tabs { display:flex; background:#e2e2e2; }
.tab-btn { flex:1; padding:1em; cursor:pointer; text-align:center; border:none; background:#e2e2e2; }
.tab-btn.active { background:#007bff; color:white; }
.tab-content { display:none; padding:1em; }
.tab-content.active { display:block; }
.row { display:flex; flex-wrap:wrap; gap:0.5em; margin-bottom:1em; }
input, select, button, textarea { padding:0.5em; font-size:1em; }
table { width:100%; border-collapse:collapse; margin-top:1em; }
th, td { border:1px solid #ddd; padding:0.5em; text-align:left; }
.task-stage { padding:0.2em 0.5em; border-radius:4px; color:white; }
.stage-quote { background: #17a2b8; }
.stage-follow { background: #ffc107; }
.stage-order { background: #28a745; }
.stage-bank { background: #6c757d; }
.notification { position:fixed; top:1em; right:1em; background:#ffcc00; padding:1em; display:none; cursor:pointer; z-index:1000; border-radius:5px; box-shadow:0 0 5px #555; }
.logo-container img { max-width:100px; margin-bottom:1em; }
@media(max-width:768px){ .row{flex-direction:column;} table, th, td{font-size:0.9em;} .logo-container img{max-width:80px;} }
</style>
</head>
<body>
<header>
  <h1 data-lang-key="title">CRM System & Tasks For Utopia Trading And Export</h1>
  <div>
    <select onchange="changeLang(this.value)">
      <option value="en">English</option>
      <option value="ar">العربية</option>
    </select>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('crmTab', this)" data-lang-key="crm">CRM</button>
  <button class="tab-btn" onclick="showTab('tasksTab', this)" data-lang-key="tasks">Tasks</button>
</div>

<div id="crmTab" class="tab-content active">
  <div class="logo-container"><img src="logo.png" alt="Company Logo"></div>
  <h2 data-lang-key="crm_title">CRM System</h2>
  <div class="row">
    <input id="name" placeholder="Name" data-lang-placeholder-en="Name" data-lang-placeholder-ar="الاسم">
    <input id="phone" placeholder="Phone" data-lang-placeholder-en="Phone" data-lang-placeholder-ar="رقم الهاتف">
    <input type="date" id="date">
    <select id="status">
      <option value="Interested" data-lang-option-en="Interested" data-lang-option-ar="مهتم">Interested</option>
      <option value="Hold" data-lang-option-en="Hold" data-lang-option-ar="قيد الانتظار">Hold</option>
      <option value="Converted" data-lang-option-en="Converted" data-lang-option-ar="تم التحويل">Converted</option>
    </select>
    <input id="notes" placeholder="Notes" data-lang-placeholder-en="Notes" data-lang-placeholder-ar="ملاحظات">
    <input id="agent" placeholder="Agent" data-lang-placeholder-en="Agent" data-lang-placeholder-ar="المسئول">
    <input id="reminderDays" placeholder="Reminder Days">
    <input id="followUp" placeholder="Follow Up">
    <button onclick="addOrUpdate()" data-lang-key="save">💾 Save</button>
  </div>
  <input id="universalSearch" placeholder="Search..." oninput="renderCRM()">
  <div>Total: <span id="total">0</span> | Hold: <span id="hold">0</span></div>
  <table>
    <thead><tr>
      <th data-lang-key="name">Name</th>
      <th data-lang-key="phone">Phone</th>
      <th data-lang-key="date">Date</th>
      <th data-lang-key="status">Status</th>
      <th data-lang-key="notes">Notes</th>
      <th data-lang-key="reminder">Reminder</th>
      <th data-lang-key="followup">Follow Up</th>
      <th data-lang-key="whatsapp">WhatsApp</th>
      <th data-lang-key="edit">Edit</th>
      <th data-lang-key="delete">Delete</th>
    </tr></thead>
    <tbody id="table"></tbody>
  </table>
</div>

<div id="tasksTab" class="tab-content">
  <div class="logo-container"><img src="logo.png" alt="Company Logo"></div>
  <h2 data-lang-key="tasks_title">Tasks</h2>
  <div class="row">
    <input id="taskInput" placeholder="Task Text" data-lang-placeholder-en="Task Text" data-lang-placeholder-ar="نص المهمة">
    <select id="taskClient"><option value="">Select Client</option></select>
    <input type="date" id="taskDate">
    <select id="taskStage">
      <option value="quote" data-lang-option-en="Quote" data-lang-option-ar="تقديم عرض سعر">Quote</option>
      <option value="follow" data-lang-option-en="Follow Up" data-lang-option-ar="متابعة عرض السعر">Follow Up</option>
      <option value="order" data-lang-option-en="Order" data-lang-option-ar="أمر توريد">Order</option>
      <option value="bank" data-lang-option-en="Bank" data-lang-option-ar="البنك">Bank</option>
    </select>
    <button onclick="addTask()" data-lang-key="add_task">➕ Add Task</button>
  </div>
  <table>
    <thead><tr>
      <th data-lang-key="client">Client</th><th data-lang-key="date">Date</th><th data-lang-key="stage">Stage</th><th data-lang-key="task">Task</th><th data-lang-key="edit">Edit</th><th data-lang-key="delete">Delete</th>
    </tr></thead>
    <tbody id="taskList"></tbody>
  </table>
</div>

<div id="notification" class="notification"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ------------------- Firebase -------------------
const firebaseConfig = {
  apiKey: "AIzaSyBmOQuIUzd2qYB28kPFFaGbSFJ5yXCiMLY",
  authDomain: "crm-tasking.firebaseapp.com",
  databaseURL: "https://crm-tasking-default-rtdb.firebaseio.com",
  projectId: "crm-tasking",
  storageBucket: "crm-tasking.appspot.com",
  messagingSenderId: "368062369619",
  appId: "1:368062369619:web:cd38383ab75ab473961ba6",
  measurementId: "G-16FMSDWDJ6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ------------------- Language -------------------
let lang='en';
const langData = {
  en:{title:"CRM System & Tasks For Utopia Trading And Export",crm:"CRM",tasks:"Tasks",developer:"Developed by Eng : Mahmoud Mohamed Marie",crm_title:"CRM System",tasks_title:"Tasks",save:"💾 Save",add_task:"➕ Add Task",name:"Name",phone:"Phone",date:"Date",status:"Status",notes:"Notes",reminder:"Reminder",followup:"Follow Up",whatsapp:"WhatsApp",edit:"Edit",delete:"Delete",client:"Client",stage:"Stage",task:"Task"},
  ar:{title:"نظام إدارة العملاء والمهام لشركة يوتوبيا للتجارة والتصدير",crm:"إدارة العملاء",tasks:"المهام",developer:"تم التطوير بواسطة مهندس : محمود محمد مارى",crm_title:"نظام إدارة العملاء",tasks_title:"المهام",save:"💾 حفظ",add_task:"➕ إضافة مهمة",name:"الاسم",phone:"رقم الهاتف",date:"التاريخ",status:"الحالة",notes:"ملاحظات",reminder:"تذكير",followup:"متابعة",whatsapp:"واتساب",edit:"تعديل",delete:"حذف",client:"العميل",stage:"المرحلة",task:"المهمة"}
};

// ------------------- Tabs -------------------
function showTab(id, btn){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

// ------------------- Notifications -------------------
function showNotification(msg, scrollToClient=null){const notif=document.getElementById('notification');notif.innerHTML=msg;notif.style.display='block';notif.onclick=()=>{if(scrollToClient!==null){const row=document.getElementById('clientRow-'+scrollToClient);if(row) row.scrollIntoView({behavior:'smooth',block:'center'});}};setTimeout(()=>{notif.style.display='none';},4000);}

// ------------------- CRM -------------------
let clients=[],editIndex=-1;
function loadClientsFromFirebase(){db.ref('clients').on('value',snapshot=>{const data=snapshot.val();clients=data?Object.values(data):[];renderCRM();populateClientDropdown();checkReminders();});}
function saveClientsToFirebase(){const updates={};clients.forEach((c,i)=>{updates[i]={...c};});db.ref('clients').set(updates);}
function addOrUpdate(){const name=document.getElementById('name').value;const phone=document.getElementById('phone').value;const date=document.getElementById('date').value;const status=document.getElementById('status').value;const notes=document.getElementById('notes').value;const agent=document.getElementById('agent').value;const reminderDays=document.getElementById('reminderDays').value;const followUp=document.getElementById('followUp').value;if(editIndex>-1){clients[editIndex]={name,phone,date,status,notes,agent,reminderDays,followUp};editIndex=-1;}else{clients.push({name,phone,date,status,notes,agent,reminderDays,followUp});}saveClientsToFirebase();renderCRM();populateClientDropdown();document.getElementById('name').value='';document.getElementById('phone').value='';document.getElementById('date').value='';document.getElementById('status').value='Interested';document.getElementById('notes').value='';document.getElementById('agent').value='';document.getElementById('reminderDays').value='';document.getElementById('followUp').value='';}
function populateClientDropdown(){const sel=document.getElementById('taskClient');sel.innerHTML='<option value="">Select Client</option>';clients.forEach(c=>{sel.innerHTML+=<option value="${c.name}">${c.name}</option>;});}
function renderCRM(){const table=document.getElementById("table");const filter=document.getElementById("universalSearch").value.toLowerCase();table.innerHTML="";let holdCount=0;let holdNames=[];clients.forEach((c,i)=>{let combinedText=${c.name} ${c.phone} ${c.date} ${c.status} ${c.notes} ${c.followUp}.toLowerCase();if(filter && !combinedText.includes(filter)) return;if(c.status==="Hold"){holdCount++;holdNames.push(c.name);}const rowColor=c.status==="Hold"?"style='background:#fff3cd'":"";table.innerHTML+=<tr id="clientRow-${i}" ${rowColor}><td>${c.name}</td><td>${c.phone}</td><td>${c.date}</td><td>${c.status}</td><td>${c.notes}</td><td>${c.reminderDays||'-'}</td><td>${c.followUp||'-'}</td><td><button onclick="openWhatsApp('${c.phone}')">📱</button></td><td><button onclick="editClient(${i})">✏️</button></td><td><button onclick="deleteClient(${i})">❌</button></td></tr>;});document.getElementById("total").innerText=(lang==='ar'?'الإجمالي: ':'Total: ')+clients.length;document.getElementById("hold").innerText=(lang==='ar'?'قيد الانتظار: ':'Hold: ')+holdCount;if(holdCount>0){showNotification(⚠️ ${lang==='ar'?'العملاء قيد الانتظار: ':'Clients on Hold: '}${holdNames.join(', ')});}}
function editClient(i){const c=clients[i];editIndex=i;document.getElementById('name').value=c.name;document.getElementById('phone').value=c.phone;document.getElementById('date').value=c.date;document.getElementById('status').value=c.status;document.getElementById('notes').value=c.notes;document.getElementById('agent').value=c.agent;document.getElementById('reminderDays').value=c.reminderDays;document.getElementById('followUp').value=c.followUp;}
function deleteClient(i){clients.splice(i,1);saveClientsToFirebase();renderCRM();populateClientDropdown();}
function openWhatsApp(phone){window.open(https://wa.me/${phone},'_blank');}

// ------------------- Tasks -------------------
let tasks=[],taskEditIndex=-1;
function loadTasksFromFirebase(){db.ref('tasks').on('value',snapshot=>{const data=snapshot.val();tasks=data?Object.values(data):[];renderTasks();});}
function saveTasksToFirebase(){const updates={};tasks.forEach((t,i)=>{updates[i]={...t};});db.ref('tasks').set(updates);}
function addTask(){const text=document.getElementById('taskInput').value;const client=document.getElementById('taskClient').value;const date=document.getElementById('taskDate').value;const stage=document.getElementById('taskStage').value;if(taskEditIndex>-1){tasks[taskEditIndex]={text,client,date,stage};taskEditIndex=-1;}else{tasks.push({text,client,date,stage});}saveTasksToFirebase();renderTasks();document.getElementById('taskInput').value='';document.getElementById('taskClient').value='';document.getElementById('taskDate').value='';document.getElementById('taskStage').value='quote';}
function renderTasks(){const tbody=document.getElementById('taskList');tbody.innerHTML='';tasks.forEach((t,i)=>{let stageClass='';switch(t.stage){case 'quote':stageClass='stage-quote';break;case 'follow':stageClass='stage-follow';break;case 'order':stageClass='stage-order';break;case 'bank':stageClass='stage-bank';break;}tbody.innerHTML+=<tr><td>${t.client}</td><td>${t.date}</td><td><span class="task-stage ${stageClass}">${t.stage}</span></td><td>${t.text}</td><td><button onclick="editTask(${i})">✏️</button></td><td><button onclick="deleteTask(${i})">❌</button></td></tr>;});}
function editTask(i){const t=tasks[i];taskEditIndex=i;document.getElementById('taskInput').value=t.text;document.getElementById('taskClient').value=t.client;document.getElementById('taskDate').value=t.date;document.getElementById('taskStage').value=t.stage;}
function deleteTask(i){tasks.splice(i,1);saveTasksToFirebase();renderTasks();}

// ------------------- Reminders -------------------
function checkReminders(){const today=new Date();clients.forEach(c=>{if(!c.reminderDays) return;const clientDate=new Date(c.date);const reminderDate=new Date(clientDate);reminderDate.setDate(reminderDate.getDate()+Number(c.reminderDays));if(today>=reminderDate){showNotification(Reminder: ${c.name} (${c.status}));}});}

// ------------------- Language -------------------
function changeLang(selectedLang){lang=selectedLang;document.querySelectorAll('[data-lang-key]').forEach(el=>{const key=el.getAttribute('data-lang-key');if(langData[lang] && langData[lang][key]) el.innerText=langData[lang][key];});document.querySelectorAll('input, textarea, select').forEach(el=>{const plEn=el.getAttribute('data-lang-placeholder-en');const plAr=el.getAttribute('data-lang-placeholder-ar');if(plEn && plAr) el.placeholder = lang==='ar'?plAr:plEn;if(el.tagName==='SELECT'){Array.from(el.options).forEach(option=>{const optEn=option.getAttribute('data-lang-option-en');const optAr=option.getAttribute('data-lang-option-ar');if(optEn && optAr) option.text = lang==='ar'?optAr:optEn;});}});}

// ------------------- Initialization -------------------
window.onload = ()=>{loadClientsFromFirebase();loadTasksFromFirebase();changeLang('en');};
</script>
</body>
</html>
